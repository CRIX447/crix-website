<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRIX Admin Panel</title>
<link rel="icon" href="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/newfavicon.png">
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Courier New',monospace;}
body{background:#07070F;color:white;min-height:100vh;}
:root{--red:#FF4655;--orange:#FF6B35;--green:#00CC7A;--dark:#0F0F17;}

/* ---- GATE ---- */
#gate{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;padding:20px;text-align:center;}
#gate h1{color:var(--red);font-size:28px;text-transform:uppercase;letter-spacing:3px;}
#gate p{color:#888;font-size:13px;max-width:340px;line-height:1.6;}
.gate-btn{background:linear-gradient(135deg,var(--red),var(--orange));border:2px solid rgba(255,255,255,0.15);border-bottom:5px solid rgba(0,0,0,0.4);border-radius:40px;padding:11px 30px;color:white;font-family:inherit;font-size:14px;font-weight:bold;cursor:pointer;transition:all .1s;text-transform:uppercase;}
.gate-btn:hover{transform:translateY(-2px);}
.gate-btn:active{transform:translateY(1px);border-bottom-width:2px;}

/* ---- HEADER ---- */
header{background:rgba(5,5,8,0.98);border-bottom:3px solid var(--red);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
header h1{color:var(--red);font-size:20px;letter-spacing:3px;text-transform:uppercase;}
.header-user{display:flex;align-items:center;gap:10px;font-size:12px;color:#aaa;}
.header-user img{width:30px;height:30px;border-radius:50%;border:2px solid var(--orange);}
#signOutBtn{background:rgba(255,70,85,0.15);border:1px solid var(--red);color:var(--red);border-radius:20px;padding:4px 14px;font-family:inherit;font-size:11px;cursor:pointer;}

/* ---- LAYOUT ---- */
.admin-container{max-width:1100px;margin:0 auto;padding:24px 20px;}
.tabs{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap;}
.tab{background:rgba(0,0,0,0.4);border:2px solid var(--orange);border-bottom:4px solid rgba(150,60,0,0.6);border-radius:30px;padding:8px 20px;color:white;font-family:inherit;font-size:12px;font-weight:bold;cursor:pointer;transition:all .1s;text-transform:uppercase;}
.tab.active{background:linear-gradient(135deg,var(--red),var(--orange));border-color:transparent;}
.tab:hover:not(.active){transform:translateY(-1px);}
#content{min-height:200px;}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px;}
.stat-card{background:var(--dark);border:2px solid var(--orange);border-bottom:4px solid rgba(150,60,0,0.6);border-radius:16px;padding:16px;text-align:center;}
.stat-card .num{font-size:32px;font-weight:bold;color:var(--orange);}
.stat-card .lbl{font-size:10px;color:#888;text-transform:uppercase;margin-top:4px;}

/* ---- CARDS ---- */
.card{background:rgba(0,0,0,0.45);border:1px solid rgba(255,107,53,0.3);border-radius:14px;padding:14px 16px;margin-bottom:10px;}
.card-title{font-size:13px;font-weight:bold;color:white;margin-bottom:4px;}
.card-meta{font-size:10px;color:#999;margin-bottom:8px;}
.card-details{font-size:11px;color:#bbb;font-style:italic;margin-bottom:8px;}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:9px;font-weight:bold;text-transform:uppercase;}
.badge-pending{background:rgba(255,165,0,0.2);color:#FFB347;border:1px solid #FFB347;}
.badge-resolved{background:rgba(0,204,122,0.15);color:var(--green);border:1px solid var(--green);}
.badge-dismissed{background:rgba(100,100,100,0.2);color:#888;border:1px solid #555;}
.badge-banned{background:rgba(255,70,85,0.2);color:var(--red);border:1px solid var(--red);}
.action-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.btn{border-radius:20px;padding:4px 14px;font-size:10px;font-weight:bold;cursor:pointer;font-family:inherit;border:1px solid;transition:all .1s;text-transform:uppercase;}
.btn:hover{transform:translateY(-1px);}
.btn-green{background:rgba(0,204,122,0.1);color:var(--green);border-color:var(--green);}
.btn-red{background:rgba(255,70,85,0.1);color:var(--red);border-color:var(--red);}
.btn-orange{background:rgba(255,107,53,0.1);color:var(--orange);border-color:var(--orange);}
.btn-gray{background:rgba(150,150,150,0.1);color:#aaa;border-color:#555;}
.empty{text-align:center;color:#666;padding:40px;font-size:13px;}
.search-bar{width:100%;background:rgba(0,0,0,0.5);border:2px solid var(--orange);border-radius:30px;padding:10px 18px;color:white;font-family:inherit;font-size:13px;margin-bottom:16px;}
.search-bar:focus{outline:none;border-color:var(--green);}
.ip-list{display:flex;flex-direction:column;gap:8px;}
.ip-item{display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,0.4);border:1px solid rgba(255,107,53,0.3);border-radius:12px;padding:10px 16px;}
.ip-item span{font-size:13px;color:var(--green);font-weight:bold;}
.add-ip-row{display:flex;gap:8px;margin-top:12px;}
.add-ip-input{flex:1;background:rgba(0,0,0,0.5);border:2px solid var(--orange);border-radius:30px;padding:8px 16px;color:white;font-family:inherit;font-size:13px;}
.add-ip-input:focus{outline:none;border-color:var(--green);}
.loading{text-align:center;color:#555;padding:30px;font-size:12px;}
.toast{position:fixed;bottom:20px;right:20px;background:var(--dark);border:2px solid var(--green);border-radius:12px;padding:10px 18px;font-size:12px;z-index:9999;animation:slideIn .3s ease;}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
/* ban modal */
.ban-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.88);z-index:9000;align-items:center;justify-content:center;padding:20px;}
.ban-modal.open{display:flex;}
.ban-modal-content{background:#0F0F17;border:3px solid var(--red);border-bottom:5px solid rgba(150,20,35,0.7);border-radius:22px;padding:24px;max-width:420px;width:100%;}
.ban-modal h3{color:var(--red);text-transform:uppercase;letter-spacing:1px;font-size:15px;margin-bottom:16px;word-break:break-all;}
.ban-field{margin-bottom:12px;}
.ban-field label{display:block;font-size:11px;color:#aaa;text-transform:uppercase;margin-bottom:5px;}
.ban-field select,.ban-field input,.ban-field textarea{width:100%;background:rgba(0,0,0,0.5);border:2px solid var(--orange);border-radius:12px;padding:8px 14px;color:white;font-family:inherit;font-size:13px;}
.ban-field select:focus,.ban-field input:focus,.ban-field textarea:focus{outline:none;border-color:var(--green);}
.ban-field textarea{height:70px;resize:none;}
.ban-modal-btns{display:flex;gap:8px;margin-top:16px;}
</style>
</head>
<body>

<!-- BAN / TIMEOUT MODAL -->
<div class="ban-modal" id="banModal">
    <div class="ban-modal-content">
        <h3 id="banModalTitle">BAN / TIMEOUT</h3>
        <div class="ban-field"><label>Action Type</label>
            <select id="banType"><option value="ban">🔨 Ban (permanent or timed)</option><option value="timeout">⏱️ Timeout (mute from game)</option></select>
        </div>
        <div class="ban-field"><label>Duration</label>
            <select id="banDuration" onchange="document.getElementById('banCustomHours').style.display=this.value==='custom'?'block':'none'">
                <option value="permanent">Permanent</option>
                <option value="1">1 hour</option>
                <option value="6">6 hours</option>
                <option value="24">24 hours</option>
                <option value="72">3 days</option>
                <option value="168">7 days</option>
                <option value="720">30 days</option>
                <option value="custom">Custom...</option>
            </select>
            <input type="number" id="banCustomHours" placeholder="Hours" min="1" style="display:none;margin-top:6px;">
        </div>
        <div class="ban-field"><label>Reason</label>
            <select id="banReason">
                <option value="Cheating / Exploiting">Cheating / Exploiting</option>
                <option value="Harassment / Toxic behaviour">Harassment / Toxic behaviour</option>
                <option value="Spam / Flooding chat">Spam / Flooding chat</option>
                <option value="Inappropriate name or content">Inappropriate name or content</option>
                <option value="Evading a previous ban">Evading a previous ban</option>
                <option value="Manual admin action">Manual admin action</option>
            </select>
        </div>
        <div class="ban-field"><label>Notes (optional)</label>
            <textarea id="banNotes" placeholder="Any extra context..."></textarea>
        </div>
        <div class="ban-modal-btns">
            <button class="btn btn-gray" onclick="closeBanModal()" style="flex:1;padding:10px;">CANCEL</button>
            <button class="btn btn-red" onclick="submitBan()" style="flex:2;padding:10px;font-size:13px;">APPLY</button>
        </div>
    </div>
</div>

<!-- ACCESS GATE -->
<div id="gate">
    <h1>🛡️ Admin Panel</h1>
    <p id="gateMsg">Checking access...</p>
    <button class="gate-btn" id="gateSignInBtn" style="display:none;">SIGN IN WITH GOOGLE</button>
</div>

<!-- MAIN PANEL (hidden until access granted) -->
<div id="adminPanel" style="display:none;">
    <header>
        <h1>🛡️ CRIX ADMIN</h1>
        <div class="header-user">
            <img id="adminAvatar" src="" alt="" onerror="this.style.display='none'">
            <span id="adminName"></span>
            <button id="signOutBtn">SIGN OUT</button>
        </div>
    </header>
    <div class="admin-container">
        <div class="stats-row" id="statsRow"></div>
        <div class="tabs">
            <button class="tab active" data-tab="reports">🚨 REPORTS</button>
            <button class="tab" data-tab="players">👥 PLAYERS</button>
            <button class="tab" data-tab="bans">🔨 BANS</button>
            <button class="tab" data-tab="ips">🌐 ADMIN IPs</button>
        </div>
        <input class="search-bar" id="searchBar" placeholder="🔍 Search..." oninput="filterContent()">
        <div id="content"><div class="loading">Loading...</div></div>
    </div>
</div>

<script>
let db, auth, currentAdminUser = null;
let currentTab = 'reports';
let allData = [];

async function init() {
    // Load api.json for Firebase config
    let fbConfig = null;
    try {
        const r = await fetch('api.json');
        const j = await r.json();
        fbConfig = j.firebase;
    } catch(e) {}

    if (!fbConfig) {
        document.getElementById('gateMsg').textContent = 'api.json not found or unreachable.';
        return;
    }

    firebase.initializeApp(fbConfig);
    auth = firebase.auth();
    db = firebase.firestore();

    auth.onAuthStateChanged(async user => {
        if (!user) {
            document.getElementById('gateMsg').textContent = 'You must sign in with an authorised Google account.';
            document.getElementById('gateSignInBtn').style.display = '';
            return;
        }
        // Check IP whitelist
        const allowed = await checkIP();
        if (!allowed) {
            document.getElementById('gateMsg').textContent = '⛔ Access denied. Your IP is not on the admin whitelist.';
            document.getElementById('gateSignInBtn').style.display = 'none';
            return;
        }
        currentAdminUser = user;
        showPanel(user);
    });

    document.getElementById('gateSignInBtn').onclick = () => {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).catch(e => {
            document.getElementById('gateMsg').textContent = 'Sign-in failed: ' + e.message;
        });
    };
}

async function checkIP() {
    try {
        // Get user's public IP
        const ipRes = await fetch('https://api.ipify.org?format=json');
        const ipData = await ipRes.json();
        const userIP = ipData.ip;
        // Load ip.json whitelist
        const ipListRes = await fetch('ip.json');
        const ipListData = await ipListRes.json();
        const whitelist = ipListData.adminIPs || [];
        return whitelist.includes(userIP);
    } catch(e) {
        return false;
    }
}

function showPanel(user) {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('adminPanel').style.display = '';
    document.getElementById('adminName').textContent = user.displayName || user.email || 'Admin';
    if (user.photoURL) document.getElementById('adminAvatar').src = user.photoURL;
    document.getElementById('signOutBtn').onclick = () => auth.signOut();

    // Add Firestore rules reminder if needed
    const rulesNote = document.createElement('div');
    rulesNote.id = 'rulesNote';
    rulesNote.style.cssText = 'background:rgba(255,165,0,0.08);border:1px solid rgba(255,165,0,0.4);border-radius:12px;padding:10px 14px;font-size:11px;color:#aaa;margin-bottom:16px;line-height:1.7;';
    rulesNote.innerHTML = `⚠️ <strong style="color:#FFB347;">If reports/players don't load:</strong> Your Firestore security rules must allow authenticated reads on <code>reports</code>, <code>users</code>, and <code>bans</code> collections. In the <a href="https://console.firebase.google.com" target="_blank" style="color:var(--green);">Firebase Console</a> → Firestore → Rules, add:<br>
    <code style="background:rgba(0,0,0,0.4);padding:6px 10px;border-radius:8px;display:block;margin-top:6px;font-size:10px;white-space:pre;">match /reports/{id} { allow read, write: if request.auth != null; }
match /users/{id} { allow read, write: if request.auth != null; }
match /bans/{id} { allow read, write: if request.auth != null; }</code>`;
    const statsRow = document.getElementById('statsRow');
    statsRow.parentNode.insertBefore(rulesNote, statsRow);

    loadStats();
    loadTab('reports');
    document.querySelectorAll('.tab').forEach(t => t.onclick = () => { currentTab = t.dataset.tab; document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); t.classList.add('active'); loadTab(t.dataset.tab); });
}

async function loadStats() {
    const row = document.getElementById('statsRow');
    try {
        const [reports, players, bans] = await Promise.all([
            db.collection('reports').limit(500).get(),
            db.collection('users').limit(500).get(),
            db.collection('bans').limit(500).get()
        ]);
        const now = Date.now();
        const activeBans = bans.docs.filter(d => {
            const b = d.data();
            return !b.expiresAt || (b.expiresAt.toMillis && b.expiresAt.toMillis() > now);
        });
        const pending = reports.docs.filter(d => (d.data().status || 'pending') === 'pending').length;
        row.innerHTML = [
            {n: reports.size, l: '📋 Total Reports'},
            {n: pending, l: '🔴 Pending'},
            {n: players.size, l: '👥 Players'},
            {n: activeBans.length, l: '🔨 Active Bans'},
        ].map(s => `<div class="stat-card"><div class="num">${s.n}</div><div class="lbl">${s.l}</div></div>`).join('');
    } catch(e) {
        row.innerHTML = `<div style="color:#FF4655;font-size:12px;padding:10px;">⚠️ Stats error: ${esc(e.message)} — check Firestore rules allow authenticated reads.</div>`;
        console.error('loadStats error:', e);
    }
}

async function loadTab(tab) {
    const content = document.getElementById('content');
    document.getElementById('searchBar').value = '';
    content.innerHTML = '<div class="loading">Loading...</div>';
    allData = [];
    if (tab === 'reports') await loadReports(content);
    else if (tab === 'players') await loadPlayers(content);
    else if (tab === 'bans') await loadBans(content);
    else if (tab === 'ips') await loadIPs(content);
}

async function loadReports(content) {
    try {
        // Don't use orderBy — avoids needing a Firestore composite index.
        // Fetch all, sort client-side by timestamp descending.
        const snap = await db.collection('reports').limit(200).get();
        if (snap.empty) { content.innerHTML = '<div class="empty">No reports yet. 🎉</div>'; return; }
        allData = snap.docs
            .map(d => ({id:d.id,...d.data()}))
            .sort((a,b) => {
                const ta = a.timestamp?.toMillis ? a.timestamp.toMillis() : 0;
                const tb = b.timestamp?.toMillis ? b.timestamp.toMillis() : 0;
                return tb - ta;
            });
        renderReports(content, allData);
    } catch(e) {
        content.innerHTML = `<div class="empty" style="color:#FF4655;">
            ⚠️ Error loading reports: <strong>${esc(e.message)}</strong><br><br>
            <span style="font-size:11px;color:#888;">This is usually a Firestore security rules issue.<br>
            Make sure your Firestore rules allow admin reads on the <code>reports</code> collection when authenticated.</span><br><br>
            <button class="btn btn-orange" onclick="loadTab('reports')" style="margin-top:8px;">RETRY</button>
        </div>`;
        console.error('loadReports error:', e);
    }
}

function renderReports(content, data) {
    if (!data.length) { content.innerHTML = '<div class="empty">No results.</div>'; return; }
    content.innerHTML = data.map(r => {
        const ts = r.timestamp?.toDate ? r.timestamp.toDate().toLocaleString() : '?';
        const badge = `<span class="badge badge-${r.status||'pending'}">${r.status||'pending'}</span>`;
        return `<div class="card" data-search="${esc(r.reportedName)} ${esc(r.reporterName)} ${esc(r.reason)}">
            <div class="card-title">🚨 ${esc(r.reportedName)} — ${esc(r.reason)} ${badge}</div>
            <div class="card-meta">Reported by <strong>${esc(r.reporterName)}</strong> · ${ts} · Room: ${esc(r.roomCode||'?')}</div>
            ${r.details ? `<div class="card-details">"${esc(r.details)}"</div>` : ''}
            <div class="action-row">
                <button class="btn btn-green" onclick="resolveReport('${r.id}')">✓ RESOLVE</button>
                <button class="btn btn-orange" onclick="openBanModal('${esc(r.reportedName)}','${r.id}')">🔨 BAN/TIMEOUT</button>
                <button class="btn btn-gray" onclick="dismissReport('${r.id}')">✕ DISMISS</button>
                <button class="btn btn-orange" onclick="viewReportHistory('${esc(r.reportedName)}')">📋 HISTORY</button>
            </div>
        </div>`;
    }).join('');
}

async function loadPlayers(content) {
    try {
        const snap = await db.collection('users').limit(200).get();
        if (snap.empty) { content.innerHTML = '<div class="empty">No players yet.</div>'; return; }
        allData = snap.docs
            .map(d => ({id:d.id,...d.data()}))
            .sort((a,b) => (b.highScore||0) - (a.highScore||0));
        renderPlayers(content, allData);
    } catch(e) {
        content.innerHTML = `<div class="empty" style="color:#FF4655;">⚠️ Error: ${esc(e.message)}<br><button class="btn btn-orange" onclick="loadTab('players')" style="margin-top:8px;">RETRY</button></div>`;
        console.error('loadPlayers error:', e);
    }
}

function renderPlayers(content, data) {
    if (!data.length) { content.innerHTML = '<div class="empty">No results.</div>'; return; }
    content.innerHTML = data.map(u => `<div class="card" data-search="${esc(u.displayName)} ${u.id}">
        <div class="card-title">👤 ${esc(u.displayName||'Unknown')}</div>
        <div class="card-meta">UID: <code>${esc(u.id)}</code> · High Score: <strong>${u.highScore||0}</strong> · Coins: ${u.coinCount||0} · Games: ${u.gamesPlayed||0}</div>
        ${u.photoURL ? `<div style="margin:4px 0;"><img src="${esc(u.photoURL)}" style="width:28px;height:28px;border-radius:50%;border:1px solid #555;"></div>` : ''}
        <div class="action-row">
            <button class="btn btn-orange" onclick="openBanModal('${esc(u.displayName||'?')}','','${esc(u.id)}')">🔨 BAN/TIMEOUT</button>
            <button class="btn btn-orange" onclick="viewReportHistory('${esc(u.displayName||'')}')">📋 REPORT HISTORY</button>
        </div>
    </div>`).join('');
}

async function loadBans(content) {
    try {
        const snap = await db.collection('bans').limit(200).get();
        if (snap.empty) { content.innerHTML = '<div class="empty">No bans.</div>'; return; }
        allData = snap.docs
            .map(d => ({id:d.id,...d.data()}))
            .sort((a,b) => {
                const ta = a.timestamp?.toMillis ? a.timestamp.toMillis() : 0;
                const tb = b.timestamp?.toMillis ? b.timestamp.toMillis() : 0;
                return tb - ta;
            });
        renderBans(content, allData);
    } catch(e) {
        content.innerHTML = `<div class="empty" style="color:#FF4655;">⚠️ Error: ${esc(e.message)}<br><button class="btn btn-orange" onclick="loadTab('bans')" style="margin-top:8px;">RETRY</button></div>`;
        console.error('loadBans error:', e);
    }
}

function renderBans(content, data) {
    const now = Date.now();
    if (!data.length) { content.innerHTML = '<div class="empty">No results.</div>'; return; }
    content.innerHTML = data.map(b => {
        const ts = b.timestamp?.toDate ? b.timestamp.toDate().toLocaleString() : '?';
        const isActive = !b.expiresAt || b.expiresAt.toMillis() > now;
        const expStr = b.expiresAt
            ? (isActive ? `⏱️ Expires ${b.expiresAt.toDate().toLocaleString()}` : '✅ Expired')
            : '♾️ Permanent';
        const btype = b.type === 'timeout' ? '⏱️ TIMEOUT' : '🔨 BAN';
        return `<div class="card" data-search="${esc(b.name)} ${esc(b.reason)}">
            <div class="card-title">
                <span class="badge badge-${isActive?'banned':'dismissed'}">${btype}</span>
                ${esc(b.name)}
            </div>
            <div class="card-meta">
                Issued: ${ts} · ${expStr}<br>
                Reason: <em>${esc(b.reason||'Manual action')}</em>
                ${b.uid ? ` · UID: <code>${esc(b.uid)}</code>` : ''}
            </div>
            <div class="action-row">
                ${isActive ? `<button class="btn btn-green" onclick="unban('${b.id}')">✓ UNBAN/UNTIMEOUT</button>` : ''}
                <button class="btn btn-orange" onclick="openBanModal('${esc(b.name)}','','${esc(b.uid||'')}')">EDIT</button>
            </div>
        </div>`;
    }).join('');
}

// ---- BAN MODAL ----
let _banModalTarget = { name: '', reportId: '', uid: '' };

function openBanModal(name, reportId, uid) {
    _banModalTarget = { name: name || '', reportId: reportId || '', uid: uid || '' };
    document.getElementById('banModalTitle').textContent = 'BAN / TIMEOUT: ' + (name || 'Player');
    document.getElementById('banReason').value = '';
    document.getElementById('banDuration').value = 'permanent';
    document.getElementById('banCustomHours').style.display = 'none';
    document.getElementById('banCustomHours').value = '24';
    document.getElementById('banType').value = 'ban';
    document.getElementById('banModal').style.display = 'flex';
}

function closeBanModal() { document.getElementById('banModal').style.display = 'none'; }

async function submitBan() {
    const reason = document.getElementById('banReason').value.trim() || 'Admin action';
    const duration = document.getElementById('banDuration').value;
    const type = document.getElementById('banType').value;
    const { name, reportId, uid } = _banModalTarget;

    let expiresAt = null;
    if (duration !== 'permanent') {
        const hours = duration === 'custom' ? parseInt(document.getElementById('banCustomHours').value) || 24 : parseInt(duration);
        expiresAt = new Date(Date.now() + hours * 3600000);
    }

    const banDoc = {
        name,
        uid: uid || null,
        reason,
        type,
        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        expiresAt: expiresAt ? firebase.firestore.Timestamp.fromDate(expiresAt) : null
    };

    try {
        await db.collection('bans').add(banDoc);
        if (reportId) await db.collection('reports').doc(reportId).update({ status: 'resolved' });
        closeBanModal();
        toast(`${type === 'timeout' ? 'Timeout' : 'Ban'} applied to ${name}.`);
        loadStats();
        loadTab(currentTab);
    } catch(e) { toast('Error: ' + e.message); }
}

async function viewReportHistory(name) {
    try {
        const snap = await db.collection('reports').where('reportedName', '==', name).limit(50).get();
        const content = document.getElementById('content');
        if (snap.empty) { toast('No reports found for ' + name); return; }
        const data = snap.docs
            .map(d => ({id:d.id,...d.data()}))
            .sort((a,b) => {
                const ta = a.timestamp?.toMillis ? a.timestamp.toMillis() : 0;
                const tb = b.timestamp?.toMillis ? b.timestamp.toMillis() : 0;
                return tb - ta;
            });
        renderReports(content, data);
        toast(`Showing ${data.length} report(s) for ${name}`);
    } catch(e) { toast('Error: ' + e.message); console.error(e); }
}

async function loadIPs(content) {
    let ipList = [];
    try { const r = await fetch('ip.json'); const j = await r.json(); ipList = j.adminIPs || []; } catch(e) {}
    content.innerHTML = `
        <div style="color:#aaa;font-size:12px;margin-bottom:12px;">Admin IPs loaded from <code>ip.json</code>. This file must be manually updated in your repository and redeployed to take effect on the live site.</div>
        <div class="ip-list" id="ipListEl">${ipList.map((ip,i) => `<div class="ip-item"><span>${esc(ip)}</span><button class="btn btn-red" onclick="removeIPDisplay(${i})">REMOVE</button></div>`).join('')||'<div class="empty">No IPs configured.</div>'}</div>
        <div class="add-ip-row">
            <input class="add-ip-input" id="newIPInput" placeholder="e.g. 120.158.13.134">
            <button class="btn btn-green" onclick="addIPDisplay()">ADD</button>
        </div>
        <div style="margin-top:12px;">
            <button class="btn btn-orange" onclick="copyIPJSON()">📋 COPY ip.json</button>
            <span style="color:#666;font-size:10px;margin-left:8px;">Then paste into your ip.json file and redeploy</span>
        </div>
        <div style="margin-top:14px;padding:12px;background:rgba(255,165,0,0.05);border:1px solid rgba(255,165,0,0.3);border-radius:12px;font-size:11px;color:#aaa;line-height:1.7;">
            ⚠️ Static site limitation: IP changes cannot be saved automatically. Use the copy button above to get the updated JSON, then update <code>ip.json</code> in your GitHub repo and redeploy on Vercel.
        </div>`;
    window._currentIPList = [...ipList];
}

function copyIPJSON() {
    const json = JSON.stringify({ adminIPs: window._currentIPList || [], _note: "Add IPs here to grant admin panel access." }, null, 2);
    navigator.clipboard?.writeText(json).then(() => toast('ip.json copied to clipboard!')).catch(() => toast('Copy failed — select and copy manually:\n' + json));
}

let _ipListTemp = [];
function removeIPDisplay(idx) { window._currentIPList.splice(idx, 1); renderIPList(); }
function addIPDisplay() {
    const ip = document.getElementById('newIPInput').value.trim();
    if (!ip) return;
    if (!window._currentIPList) window._currentIPList = [];
    if (!window._currentIPList.includes(ip)) window._currentIPList.push(ip);
    document.getElementById('newIPInput').value = '';
    renderIPList();
    toast(`IP ${ip} added. Click "COPY ip.json" and update your repository.`);
}
function renderIPList() {
    const el = document.getElementById('ipListEl');
    if (!el) return;
    el.innerHTML = window._currentIPList?.length
        ? window._currentIPList.map((ip,i) => `<div class="ip-item"><span>${esc(ip)}</span><button class="btn btn-red" onclick="removeIPDisplay(${i})">REMOVE</button></div>`).join('')
        : '<div class="empty">No IPs configured.</div>';
}

function filterContent() {
    const q = document.getElementById('searchBar').value.toLowerCase();
    document.querySelectorAll('.card[data-search]').forEach(card => {
        card.style.display = card.dataset.search.toLowerCase().includes(q) ? '' : 'none';
    });
}

async function resolveReport(id) {
    await db.collection('reports').doc(id).update({ status: 'resolved' });
    toast('Report resolved.');
    loadTab('reports');
}
async function dismissReport(id) {
    await db.collection('reports').doc(id).update({ status: 'dismissed' });
    toast('Report dismissed.');
    loadTab('reports');
}
async function unban(id) {
    await db.collection('bans').doc(id).delete();
    toast('Player unbanned/untimeout.');
    loadStats();
    loadTab('bans');
}
function esc(str) { const d = document.createElement('div'); d.textContent = String(str||''); return d.innerHTML; }
function toast(msg) {
    const t = document.createElement('div');
    t.className = 'toast'; t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}

init();
</script>
