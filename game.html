<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLAPPY CRIX • CRIXGAMING VR</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/newfavicon.png">
    
    <!-- Custom Pixel Font (OTF format) -->
    <style>
        @font-face {
            font-family: 'CRIX Pixel';
            src: url('https://raw.githubusercontent.com/CRIX447/crix-website/main/img/font.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
    </style>
    
    <style>
        /* CYBER STYLE WITH CURVED UI - MATCHING MAIN SITE */
        :root {
            --neon-red: #FF4655;
            --neon-orange: #FF6B35;
            --cyber-red: #FF0040;
            --cyber-orange: #FF8C00;
            --matrix-green: #00FF9D;
            --dark-bg: #0A0A0F;
            --darker-bg: #050508;
            --grid-color: rgba(255, 70, 85, 0.1);
            --text-glow: 0 0 10px rgba(255, 107, 53, 0.7);
            
            /* Curved UI additions */
            --curve-amount: 25px;
            --border-glow: 0 0 15px currentColor;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'CRIX Pixel', 'Courier New', monospace;
            background: var(--dark-bg);
            color: white;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 50px 50px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        /* CYBER GLOW EFFECTS */
        .cyber-glow {
            text-shadow: var(--text-glow);
        }
        
        /* GAME CONTAINER - CURVED */
        .game-container {
            max-width: 600px;
            width: 100%;
            background: rgba(5, 5, 8, 0.95);
            border: 3px solid var(--neon-red);
            border-radius: 40px;
            padding: 30px 20px;
            position: relative;
            box-shadow: 0 10px 30px rgba(255, 70, 85, 0.4);
        }
        
        .game-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, 
                transparent, 
                var(--neon-red), 
                var(--neon-orange), 
                var(--neon-red), 
                transparent);
            border-radius: 40px 40px 0 0;
        }
        
        /* HEADER - CURVED */
        .game-header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 3px solid var(--neon-red);
            position: relative;
        }
        
        .game-title {
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(45deg, var(--neon-red), var(--neon-orange), #FF0040);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 5px;
            animation: hologram 3s infinite alternate;
            font-family: 'CRIX Pixel', 'Courier New', monospace;
        }
        
        @keyframes hologram {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        
        .game-subtitle {
            font-size: 16px;
            color: var(--matrix-green);
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 20px;
            display: inline-block;
            border-radius: 30px;
            border: 2px solid var(--neon-orange);
            font-family: 'CRIX Pixel', 'Courier New', monospace;
        }
        
        /* CANVAS WRAPPER - CURVED */
        .canvas-wrapper {
            display: flex;
            justify-content: center;
            margin: 15px 0;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid var(--neon-orange);
            border-radius: 35px;
            box-shadow: 0 5px 20px rgba(255, 107, 53, 0.3);
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            max-width: 400px;
            height: auto;
            border: 2px solid var(--neon-orange);
            border-radius: 25px;
            background: linear-gradient(180deg, #1a1a2e 0%, #0a0a1a 100%);
        }
        
        /* STATS GRID - CURVED */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }
        
        .cyber-stat {
            background: rgba(10, 10, 15, 0.8);
            border: 2px solid var(--neon-orange);
            border-radius: 20px;
            padding: 10px 5px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(255, 107, 53, 0.3);
        }
        
        .cyber-stat:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 107, 53, 0.5);
        }
        
        .stat-label {
            font-size: 12px;
            color: #ccc;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 3px;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: var(--neon-orange);
            font-family: 'CRIX Pixel', 'Courier New', monospace;
        }
        
        /* COIN COUNT SPECIAL STYLING */
        #coinCount {
            color: gold;
            text-shadow: 0 0 10px gold;
        }
        
        /* LOCKER BUTTON */
        .locker-button {
            background: linear-gradient(45deg, var(--neon-red), var(--neon-orange));
            color: white;
            border: 2px solid var(--matrix-green);
            border-radius: 30px;
            padding: 10px 25px;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'CRIX Pixel', 'Courier New', monospace;
            margin: 10px auto;
            display: block;
            width: fit-content;
            box-shadow: 0 5px 15px rgba(0, 255, 157, 0.3);
        }
        
        .locker-button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px var(--matrix-green);
            border-color: gold;
        }
        
        /* LOCKER MODAL */
        .locker-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(5px);
            z-index: 10000;
            overflow-y: auto;
            padding: 20px;
        }
        
        .locker-modal.active {
            display: block;
        }
        
        .locker-modal-content {
            max-width: 600px;
            margin: 30px auto;
            background: var(--dark-bg);
            border: 3px solid var(--neon-red);
            border-radius: 40px;
            padding: 25px;
            position: relative;
        }
        
        .locker-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--matrix-green);
            padding-bottom: 10px;
        }
        
        .locker-modal-title {
            font-size: 28px;
            color: var(--matrix-green);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'CRIX Pixel', 'Courier New', monospace;
        }
        
        .locker-modal-close {
            background: transparent;
            border: 2px solid var(--neon-red);
            color: var(--neon-red);
            font-size: 24px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .locker-modal-close:hover {
            background: var(--neon-red);
            color: white;
            transform: rotate(90deg);
        }
        
        .locker-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--neon-orange);
            padding-bottom: 10px;
        }
        
        .locker-tab {
            background: transparent;
            border: 2px solid var(--neon-orange);
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'CRIX Pixel', 'Courier New', monospace;
            font-size: 14px;
        }
        
        .locker-tab:hover {
            background: rgba(255, 107, 53, 0.3);
            border-color: var(--matrix-green);
        }
        
        .locker-tab.active {
            background: var(--neon-orange);
            border-color: var(--matrix-green);
            color: black;
        }
        
        .locker-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
            max-height: 300px;
            overflow-y: auto;
            padding: 10px;
        }
        
        .locker-item {
            background: rgba(20, 20, 30, 0.9);
            border: 2px solid var(--neon-orange);
            border-radius: 20px;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        
        .locker-item:hover {
            transform: scale(1.05);
            border-color: var(--matrix-green);
            box-shadow: 0 0 20px var(--matrix-green);
        }
        
        .locker-item.owned {
            border-color: gold;
            background: rgba(255, 215, 0, 0.1);
        }
        
        .locker-item.equipped {
            border-color: var(--matrix-green);
            box-shadow: 0 0 30px var(--matrix-green);
            background: rgba(0, 255, 157, 0.1);
        }
        
        .locker-item img {
            width: 50px;
            height: 50px;
            object-fit: contain;
            margin-bottom: 8px;
        }
        
        .locker-item-name {
            font-size: 12px;
            color: white;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        
        .locker-item-price {
            font-size: 14px;
            color: gold;
            font-weight: bold;
        }
        
        .locker-item-owned {
            font-size: 12px;
            color: var(--matrix-green);
            margin-top: 5px;
        }
        
        .locker-equip-btn {
            background: linear-gradient(45deg, var(--matrix-green), #00F0FF);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 10px 25px;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'CRIX Pixel', 'Courier New', monospace;
            width: 100%;
            margin: 15px 0;
        }
        
        .locker-equip-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 20px var(--matrix-green);
        }
        
        .locker-balance {
            text-align: center;
            font-size: 20px;
            color: gold;
            margin: 15px 0;
            padding: 10px;
            border: 2px solid gold;
            border-radius: 30px;
        }
        
        /* POWERUPS SECTION */
        .powerups-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        
        .powerup-item {
            background: rgba(20, 20, 30, 0.9);
            border: 2px solid var(--neon-orange);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .powerup-item:hover {
            transform: scale(1.05);
            border-color: var(--matrix-green);
            box-shadow: 0 0 20px var(--matrix-green);
        }
        
        .powerup-item.active {
            border-color: gold;
            box-shadow: 0 0 30px gold;
            background: rgba(255, 215, 0, 0.1);
        }
        
        .powerup-name {
            font-size: 16px;
            color: white;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        
        .powerup-price {
            font-size: 18px;
            color: gold;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .powerup-desc {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 10px;
        }
        
        .powerup-buy-btn {
            background: linear-gradient(45deg, var(--neon-red), var(--neon-orange));
            color: white;
            border: none;
            border-radius: 20px;
            padding: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-family: 'CRIX Pixel', 'Courier New', monospace;
        }
        
        .powerup-buy-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--neon-orange);
        }
        
        .powerup-buy-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* CHEAT CODES SECTION */
        .cheats-section {
            margin: 20px 0;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid var(--neon-red);
            border-radius: 25px;
        }
        
        .cheats-title {
            color: var(--neon-red);
            font-size: 18px;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 10px;
        }
        
        .cheats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            text-align: center;
        }
        
        .cheat-code {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--neon-orange);
            border-radius: 15px;
            padding: 5px;
            font-size: 14px;
            color: var(--matrix-green);
        }
        
        .cheat-desc {
            font-size: 10px;
            color: #aaa;
        }
        
        /* BUTTONS - CURVED */
        .controls-box {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        
        .game-btn {
            background: linear-gradient(45deg, var(--neon-red), var(--neon-orange));
            color: white;
            border: 2px solid var(--matrix-green);
            border-radius: 30px;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'CRIX Pixel', 'Courier New', monospace;
            box-shadow: 0 5px 15px rgba(0, 255, 157, 0.3);
        }
        
        .game-btn:hover {
            background: linear-gradient(45deg, var(--cyber-red), var(--cyber-orange));
            transform: translateY(-3px);
            box-shadow: 0 8px 25px var(--matrix-green);
        }
        
        .game-btn.secondary {
            background: linear-gradient(45deg, var(--matrix-green), #00F0FF);
        }
        
        /* INSTRUCTIONS - CURVED */
        .instructions {
            text-align: center;
            margin: 15px 0;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid var(--neon-orange);
            border-radius: 30px;
        }
        
        .instructions p {
            color: #ccc;
            font-size: 14px;
            margin: 5px 0;
        }
        
        .instructions .highlight {
            color: var(--neon-orange);
        }
        
        /* BACK LINK - CURVED */
        .back-link {
            text-align: center;
            margin-top: 15px;
        }
        
        .back-link a {
            color: var(--matrix-green);
            text-decoration: none;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 6px 20px;
            border: 2px solid var(--neon-red);
            border-radius: 30px;
            display: inline-block;
            transition: all 0.3s;
        }
        
        .back-link a:hover {
            border-color: var(--matrix-green);
            color: var(--neon-orange);
            transform: scale(1.05);
        }
        
        /* BOUNCE ANIMATION FOR EXIT */
        @keyframes bounce {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-20px); }
            50% { transform: translateX(20px); }
            75% { transform: translateX(-10px); }
        }
        
        .bounce {
            animation: bounce 0.5s ease-in-out;
        }
        
        /* RESPONSIVE */
        @media (max-width: 500px) {
            .game-title { font-size: 36px; }
            .game-subtitle { font-size: 12px; }
            .game-btn { font-size: 14px; padding: 8px 15px; }
            .stats-grid { gap: 5px; }
            .stat-value { font-size: 16px; }
            .locker-grid { grid-template-columns: repeat(2, 1fr); }
            .powerups-grid { grid-template-columns: 1fr; }
            .cheats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <!-- AUDIO PLAYER (hidden) -->
    <audio id="jumpSound" preload="auto">
        <source src="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/jump.mp3" type="audio/mpeg">
    </audio>
    
    <audio id="deathSound" preload="auto">
        <source src="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/death.mp3" type="audio/mpeg">
    </audio>
    
    <audio id="selectSound" preload="auto">
        <source src="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/select.mp3" type="audio/mpeg">
    </audio>
    
    <audio id="coinSound" preload="auto">
        <source src="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/coin.mp3" type="audio/mpeg">
    </audio>
    
    <audio id="purchaseSound" preload="auto">
        <source src="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/select.mp3" type="audio/mpeg">
    </audio>
    
    <audio id="powerupSound" preload="auto">
        <source src="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/select.mp3" type="audio/mpeg">
    </audio>
    
    <audio id="bgMusic" loop>
        <source src="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/music.mp3" type="audio/mpeg">
    </audio>
    
    <div class="game-container">
        <div class="game-header">
            <div class="game-title">FLAPPY CRIX</div>
            <div class="game-subtitle">wear the drip • collect the coins</div>
        </div>
        
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="400" height="600"></canvas>
        </div>
        
        <div class="stats-grid">
            <div class="cyber-stat">
                <div class="stat-label">SCORE</div>
                <div class="stat-value" id="gameScore">0</div>
            </div>
            <div class="cyber-stat">
                <div class="stat-label">COINS</div>
                <div class="stat-value" id="coinCount">🪙 0</div>
            </div>
            <div class="cyber-stat">
                <div class="stat-label">HIGH</div>
                <div class="stat-value" id="highScore">0</div>
            </div>
            <div class="cyber-stat">
                <div class="stat-label">MULT</div>
                <div class="stat-value" id="coinMultiplier">1x</div>
            </div>
        </div>
        
        <!-- LOCKER BUTTON -->
        <button class="locker-button" id="lockerBtn">👕 OPEN LOCKER 👕</button>
        
        <!-- ACTIVE CHEATS DISPLAY -->
        <div id="activeCheats" style="text-align: center; min-height: 25px; margin: 5px 0;"></div>
        
        <div class="controls-box">
            <button class="game-btn" id="startGameBtn">▶ START</button>
            <button class="game-btn secondary" id="musicToggleBtn">🔊 MUSIC</button>
        </div>
        
        <div class="instructions">
            <p><span class="highlight">⬆️ SPACE/CLICK</span> to flap • <span class="highlight">🪙 COLLECT COINS</span> for drip</p>
        </div>
        
        <!-- CHEAT CODES DISPLAYED ON PAGE -->
        <div class="cheats-section">
            <div class="cheats-title">⚡ CHEAT CODES ⚡</div>
            <div class="cheats-grid">
                <div><span class="cheat-code">6969</span><div class="cheat-desc">GODMODE</div></div>
                <div><span class="cheat-code">1337</span><div class="cheat-desc">COIN LORD</div></div>
                <div><span class="cheat-code">0420</span><div class="cheat-desc">SLOW MO</div></div>
                <div><span class="cheat-code">8008</span><div class="cheat-desc">BIG BIRD</div></div>
                <div><span class="cheat-code">9999</span><div class="cheat-desc">+100 COINS</div></div>
                <div><span class="cheat-code">2468</span><div class="cheat-desc">2X COINS</div></div>
            </div>
            <div style="text-align: center; margin-top: 10px;">
                <input type="text" class="cheat-input" id="cheatInput" placeholder="ENTER CODE" maxlength="4" autocomplete="off" style="width:120px;">
            </div>
        </div>
        
        <div class="back-link">
            <a href="https://crixgamingvr.vercel.app" target="_blank" id="backLink">← BACK TO MAIN SITE</a>
        </div>
    </div>
    
    <!-- LOCKER MODAL -->
    <div class="locker-modal" id="lockerModal">
        <div class="locker-modal-content">
            <div class="locker-modal-header">
                <div class="locker-modal-title">👕 CRIX LOCKER</div>
                <button class="locker-modal-close" id="closeLockerBtn">✕</button>
            </div>
            
            <div class="locker-balance" id="lockerBalance">YOUR COINS: 🪙 0</div>
            
            <div class="locker-tabs">
                <button class="locker-tab active" id="tabCosmetics">🎨 COSMETICS</button>
                <button class="locker-tab" id="tabPowerups">⚡ POWER-UPS</button>
            </div>
            
            <!-- COSMETICS TAB -->
            <div id="cosmeticsTab">
                <div class="locker-grid" id="cosmeticsGrid">
                    <!-- Cosmetics will be loaded here -->
                </div>
            </div>
            
            <!-- POWERUPS TAB (hidden by default) -->
            <div id="powerupsTab" style="display: none;">
                <div class="powerups-grid" id="powerupsGrid">
                    <!-- Powerups will be loaded here -->
                </div>
            </div>
            
            <button class="locker-equip-btn" id="lockerActionBtn">EQUIP SELECTED</button>
        </div>
    </div>
    
    <script>
        // ========== GAME VARIABLES ==========
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameScore = document.getElementById('gameScore');
        const coinCountEl = document.getElementById('coinCount');
        const highScoreEl = document.getElementById('highScore');
        const coinMultiplierEl = document.getElementById('coinMultiplier');
        const startGameBtn = document.getElementById('startGameBtn');
        const musicToggle = document.getElementById('musicToggleBtn');
        const backLink = document.getElementById('backLink');
        const cheatInput = document.getElementById('cheatInput');
        const activeCheats = document.getElementById('activeCheats');
        const lockerBtn = document.getElementById('lockerBtn');
        const lockerModal = document.getElementById('lockerModal');
        const closeLockerBtn = document.getElementById('closeLockerBtn');

        // ========== GAME CLASS ==========
        class FlappyBird {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.bird = {
                    x: 100,
                    y: 300,
                    width: activeCheatEffects.bigbird ? 45 : 30,
                    height: activeCheatEffects.bigbird ? 45 : 30,
                    velocity: 0,
                    gravity: activeCheatEffects.slowmo ? 0.15 : 0.25,
                    jump: activeCheatEffects.slowmo ? -5 : -6.5,
                    angle: 0
                };
                
                this.pipes = [];
                this.pipeWidth = 50;
                this.pipeGap = 170;
                this.pipeSpacing = 300;
                this.frameCount = 0;
                this.score = 0;
                this.gameOver = false;
                
                // Reset coins
                coins = [];
                if (!activeCheatEffects.coinlord) {
                    // Keep coin count
                }
            }
            
            // Helper to check if a position is safe for a coin
            isCoinPositionSafe(x, y) {
                if (y < 40 || y > canvas.height - 40) return false;
                
                for (let pipe of this.pipes) {
                    if (Math.abs(x - pipe.x) < 60) {
                        if (y < pipe.top - 30 || y > pipe.bottom + 30) {
                            return false;
                        }
                    }
                }
                
                return true;
            }
            
            getSafeCoinY(x) {
                let attempts = 0;
                const maxAttempts = 50;
                
                while (attempts < maxAttempts) {
                    const y = Math.random() * (canvas.height - 80) + 40;
                    if (this.isCoinPositionSafe(x, y)) {
                        return y;
                    }
                    attempts++;
                }
                
                return canvas.height / 2;
            }
            
            draw() {
                // Clear canvas
                ctx.fillStyle = '#0A0A0F';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Draw grid
                ctx.strokeStyle = 'rgba(255, 70, 85, 0.1)';
                ctx.lineWidth = 1;
                for (let i = 0; i < canvas.width; i += 50) {
                    ctx.beginPath();
                    ctx.moveTo(i, 0);
                    ctx.lineTo(i, canvas.height);
                    ctx.stroke();
                }
                for (let i = 0; i < canvas.height; i += 50) {
                    ctx.beginPath();
                    ctx.moveTo(0, i);
                    ctx.lineTo(canvas.width, i);
                    ctx.stroke();
                }
                
                // Draw pipes
                ctx.fillStyle = '#00FF9D';
                ctx.shadowColor = '#00FF9D';
                ctx.shadowBlur = 10;
                this.pipes.forEach(pipe => {
                    this.roundRect(pipe.x, 0, this.pipeWidth, pipe.top, 15);
                    ctx.fill();
                    this.roundRect(pipe.x, pipe.bottom, this.pipeWidth, canvas.height - pipe.bottom, 15);
                    ctx.fill();
                });
                ctx.shadowBlur = 0;
                
                // Draw coins
                coins.forEach(coin => {
                    if (!coin.collected) {
                        if (coinImage.complete) {
                            ctx.drawImage(coinImage, coin.x - 15, coin.y - 15, 30, 30);
                        } else {
                            ctx.fillStyle = 'gold';
                            ctx.shadowColor = 'gold';
                            ctx.shadowBlur = 15;
                            ctx.beginPath();
                            ctx.arc(coin.x, coin.y, 12, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                });
                ctx.shadowBlur = 0;
                
                // Draw bird with rotation based on velocity
                ctx.save();
                ctx.translate(this.bird.x, this.bird.y);
                
                // Calculate rotation angle based on velocity
                let rotationAngle = Math.min(Math.max(this.bird.velocity * 0.1, -0.5), 0.5);
                ctx.rotate(rotationAngle);
                
                // Draw bird body
                if (birdImage.complete) {
                    let size = activeCheatEffects.bigbird ? 45 : 30;
                    ctx.drawImage(birdImage, -size/2, -size/2, size, size);
                    
                    // Draw shirt (on body)
                    const shirtItem = cosmetics.find(i => i.type === 'shirt' && i.equipped);
                    if (shirtItem) {
                        const shirtImg = new Image();
                        shirtImg.src = shirtItem.image;
                        ctx.drawImage(shirtImg, -size/2, -size/2, size, size);
                    }
                    
                    // Draw hat (on head)
                    const hatItem = cosmetics.find(i => i.type === 'hat' && i.equipped);
                    if (hatItem) {
                        const hatImg = new Image();
                        hatImg.src = hatItem.image;
                        ctx.drawImage(hatImg, -size/2, -size/2 - 5, size, size);
                    }
                    
                    // Draw accessory
                    const accessoryItem = cosmetics.find(i => i.type === 'accessory' && i.equipped);
                    if (accessoryItem) {
                        const accessoryImg = new Image();
                        accessoryImg.src = accessoryItem.image;
                        ctx.drawImage(accessoryImg, -size/2 + 5, -size/2, size, size);
                    }
                } else {
                    // Fallback
                    ctx.fillStyle = '#FF6B35';
                    ctx.shadowColor = '#FF6B35';
                    ctx.shadowBlur = 15;
                    ctx.beginPath();
                    ctx.arc(0, 0, activeCheatEffects.bigbird ? 22 : 15, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.restore();
                
                // Draw score
                if (!this.gameOver && gameRunning) {
                    ctx.fillStyle = '#FF6B35';
                    ctx.font = '20px "CRIX Pixel", monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText(`SCORE: ${this.score}`, canvas.width / 2, 50);
                }
                
                // Draw active cheat indicators
                if (activeCheatEffects.godmode) {
                    ctx.fillStyle = 'rgba(255, 70, 85, 0.3)';
                    ctx.font = '14px "CRIX Pixel", monospace';
                    ctx.fillText('⚡ GODMODE', canvas.width - 100, 80);
                }
                
                if (this.gameOver) {
                    ctx.fillStyle = '#FF4655';
                    ctx.font = '28px "CRIX Pixel", monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2);
                    ctx.font = '16px "CRIX Pixel", monospace';
                    ctx.fillText('Press START', canvas.width / 2, canvas.height / 2 + 40);
                }
            }
            
            roundRect(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                ctx.beginPath();
                ctx.moveTo(x + r, y);
                ctx.lineTo(x + w - r, y);
                ctx.quadraticCurveTo(x + w, y, x + w, y + r);
                ctx.lineTo(x + w, y + h - r);
                ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                ctx.lineTo(x + r, y + h);
                ctx.quadraticCurveTo(x, y + h, x, y + h - r);
                ctx.lineTo(x, y + r);
                ctx.quadraticCurveTo(x, y, x + r, y);
                ctx.closePath();
            }
            
            update() {
                if (this.gameOver) return;
                
                // Bird physics
                this.bird.velocity += this.bird.gravity;
                this.bird.y += this.bird.velocity;
                
                // Check boundaries
                if (!activeCheatEffects.godmode) {
                    if (this.bird.y < 10 || this.bird.y > canvas.height - 10) {
                        this.gameOver = true;
                        playDeathSound();
                        this.updateHighScore();
                    }
                } else {
                    if (this.bird.y < 10) {
                        this.bird.y = 10;
                        this.bird.velocity = Math.abs(this.bird.velocity) * 0.5;
                    }
                    if (this.bird.y > canvas.height - 10) {
                        this.bird.y = canvas.height - 10;
                        this.bird.velocity = -Math.abs(this.bird.velocity) * 0.5;
                    }
                }
                
                // Generate pipes
                if (this.frameCount % (activeCheatEffects.slowmo ? 180 : 120) === 0) {
                    const topHeight = Math.random() * (canvas.height - this.pipeGap - 150) + 70;
                    this.pipes.push({
                        x: canvas.width,
                        top: topHeight,
                        bottom: topHeight + this.pipeGap,
                        scored: false
                    });
                }
                
                // Generate coins
                if (this.frameCount % 40 === 0 && gameRunning) {
                    if (activeCheatEffects.coinlord || activeCheatEffects.x2coins || Math.random() < 0.35) {
                        const coinX = canvas.width + 40;
                        const coinY = this.getSafeCoinY(coinX);
                        
                        if (this.isCoinPositionSafe(coinX, coinY)) {
                            coins.push({
                                x: coinX,
                                y: coinY,
                                collected: false
                            });
                        }
                    }
                }
                
                // Update pipes
                let speed = activeCheatEffects.slowmo ? 1.5 : 2.5;
                for (let i = this.pipes.length - 1; i >= 0; i--) {
                    this.pipes[i].x -= speed;
                    
                    if (!activeCheatEffects.godmode) {
                        if (this.bird.x + this.bird.width/2 > this.pipes[i].x && 
                            this.bird.x - this.bird.width/2 < this.pipes[i].x + this.pipeWidth) {
                            if (this.bird.y - this.bird.height/2 < this.pipes[i].top || 
                                this.bird.y + this.bird.height/2 > this.pipes[i].bottom) {
                                this.gameOver = true;
                                playDeathSound();
                                this.updateHighScore();
                            }
                        }
                    }
                    
                    if (this.pipes[i].x + this.pipeWidth < this.bird.x && !this.pipes[i].scored) {
                        this.score++;
                        this.pipes[i].scored = true;
                        gameScore.textContent = this.score;
                    }
                    
                    if (this.pipes[i].x + this.pipeWidth < 0) {
                        this.pipes.splice(i, 1);
                    }
                }
                
                // Update coins
                for (let i = coins.length - 1; i >= 0; i--) {
                    if (!coins[i].collected) {
                        coins[i].x -= speed;
                        
                        const dist = Math.hypot(this.bird.x - coins[i].x, this.bird.y - coins[i].y);
                        if (dist < 30) {
                            coins[i].collected = true;
                            coinCount += coinMultiplier;
                            playCoinSound();
                            updateCoinDisplay();
                            localStorage.setItem('flappyCrixCoins', coinCount);
                            
                            if (activeCheatEffects.coinlord || activeCheatEffects.x2coins) {
                                this.score += 5;
                                gameScore.textContent = this.score;
                            }
                        }
                        
                        if (coins[i].x + 30 < 0) {
                            coins.splice(i, 1);
                        }
                    } else {
                        coins.splice(i, 1);
                    }
                }
                
                this.frameCount++;
            }
            
            updateHighScore() {
                if (this.score > highScore) {
                    highScore = this.score;
                    localStorage.setItem('flappyCrixHighScore', highScore);
                    highScoreEl.textContent = highScore;
                }
            }
            
            jump() {
                if (this.gameOver || !gameRunning) return;
                this.bird.velocity = this.bird.jump;
                playJumpSound();
            }
        }

            }
            if (activeCheatEffects.slowmo) {
                html += '<span class="cheat-indicator" style="background:rgba(0,255,157,0.3); border-color:var(--matrix-green); color:var(--matrix-green);">⏱️ SLOW MO</span>';
            }
            if (activeCheatEffects.bigbird) {
                html += '<span class="cheat-indicator" style="background:rgba(255,107,53,0.3); border-color:var(--neon-orange); color:var(--neon-orange);">🦅 BIG BIRD</span>';
            }
            if (activeCheatEffects.x2coins) {
                html += '<span class="cheat-indicator" style="background:rgba(255,215,0,0.3); border-color:gold; color:gold;">💰 2X COINS</span>';
            }
            activeCheats.innerHTML = html;
        }

        // ========== EXIT WITH BOUNCE ==========
        backLink.addEventListener('click', (e) => {
            if (activeCheatEffects.godmode) {
                e.preventDefault();
                document.querySelector('.game-container').classList.add('bounce');
                alert('HEY! I KNOW YOU GOT GODMODE BUT IT DOESNT MEAN YOU GOTTA BREAK THE FORTH WALL MAN!');
                setTimeout(() => {
                    document.querySelector('.game-container').classList.remove('bounce');
                }, 500);
                setTimeout(() => {
                    window.open('https://crixgamingvr.vercel.app', '_blank');
                }, 600);
            }
        });

        // ========== GAME LOOP ==========
        function gameLoop() {
            if (gameRunning) {
                game.update();
                game.draw();
                gameAnimationFrame = requestAnimationFrame(gameLoop);
            }
        }

        function startGame() {
            playSelectSound();
            game.reset();
            gameRunning = true;
            gameScore.textContent = '0';
            
            // Resume music if it was playing before death
            if (musicWasPlaying && musicMuted) {
                bgMusic.play();
                musicToggle.innerHTML = '🔊 MUSIC';
                musicMuted = false;
                musicWasPlaying = false;
            }
            
            if (gameAnimationFrame) cancelAnimationFrame(gameAnimationFrame);
            gameLoop();
        }

        // ========== EVENT LISTENERS ==========
        startGameBtn.addEventListener('click', startGame);
        
        lockerBtn.addEventListener('click', openLocker);
        closeLockerBtn.addEventListener('click', closeLocker);
        
        tabCosmetics.addEventListener('click', () => {
            tabCosmetics.classList.add('active');
            tabPowerups.classList.remove('active');
            cosmeticsTab.style.display = 'block';
            powerupsTab.style.display = 'none';
            lockerActionBtn.style.display = 'block';
        });
        
        tabPowerups.addEventListener('click', () => {
            tabPowerups.classList.add('active');
            tabCosmetics.classList.remove('active');
            cosmeticsTab.style.display = 'none';
            powerupsTab.style.display = 'block';
            lockerActionBtn.style.display = 'none';
            updateLockerDisplay();
        });
        
        lockerActionBtn.addEventListener('click', () => {
            equipSelected();
        });
        
        // Item selection
        document.addEventListener('click', (e) => {
            if (e.target.closest('.locker-item')) {
                document.querySelectorAll('.locker-item').forEach(i => i.classList.remove('selected'));
                e.target.closest('.locker-item').classList.add('selected');
            }
        });
        
        window.addEventListener('click', (e) => {
            if (e.target === lockerModal) {
                closeLocker();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                game.jump();
            }
        });

        canvas.addEventListener('click', () => {
            game.jump();
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            game.jump();
        });

        // Draw initial screen
        game.draw();
    </script>
</body>
</html>
