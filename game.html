<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLAPPY CRIX • CRIXGAMING VR</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/newfavicon.png">
    
    <!-- Custom Pixel Font (OTF format) -->
    <style>
        @font-face {
            font-family: 'CRIX Pixel';
            src: url('https://raw.githubusercontent.com/CRIX447/crix-website/main/img/font.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
    </style>
    
    <style>
        /* CYBER STYLE WITH CURVED UI */
        :root {
            --neon-red: #FF4655;
            --neon-orange: #FF6B35;
            --cyber-red: #FF0040;
            --cyber-orange: #FF8C00;
            --matrix-green: #00FF9D;
            --dark-bg: #0A0A0F;
            --darker-bg: #050508;
            --grid-color: rgba(255, 70, 85, 0.1);
            --text-glow: 0 0 10px rgba(255, 107, 53, 0.7);
            
            /* Curved UI additions */
            --curve-amount: 25px;
            --border-glow: 0 0 15px currentColor;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'CRIX Pixel', 'Courier New', monospace;
            background: var(--dark-bg);
            color: white;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 50px 50px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        /* GAME CONTAINER */
        .game-container {
            max-width: 600px;
            width: 100%;
            background: rgba(5, 5, 8, 0.95);
            border: 3px solid var(--neon-red);
            border-radius: 40px;
            padding: 30px 20px;
            position: relative;
            box-shadow: 0 10px 30px rgba(255, 70, 85, 0.4);
        }
        
        .game-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, 
                transparent, 
                var(--neon-red), 
                var(--neon-orange), 
                var(--neon-red), 
                transparent);
            border-radius: 40px 40px 0 0;
        }
        
        /* HEADER */
        .game-header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 3px solid var(--neon-red);
        }
        
        .game-title {
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(45deg, var(--neon-red), var(--neon-orange), #FF0040);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 5px;
            animation: hologram 3s infinite alternate;
            font-family: 'CRIX Pixel', 'Courier New', monospace;
        }
        
        @keyframes hologram {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        
        .game-subtitle {
            font-size: 16px;
            color: var(--matrix-green);
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 20px;
            display: inline-block;
            border-radius: 30px;
            border: 2px solid var(--neon-orange);
            font-family: 'CRIX Pixel', 'Courier New', monospace;
        }
        
        /* CANVAS WRAPPER */
        .canvas-wrapper {
            display: flex;
            justify-content: center;
            margin: 15px 0;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid var(--neon-orange);
            border-radius: 35px;
            box-shadow: 0 5px 20px rgba(255, 107, 53, 0.3);
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            max-width: 400px;
            height: auto;
            border: 2px solid var(--neon-orange);
            border-radius: 25px;
            background: linear-gradient(180deg, #1a1a2e 0%, #0a0a1a 100%);
        }
        
        /* STATS GRID */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }
        
        .cyber-stat {
            background: rgba(10, 10, 15, 0.8);
            border: 2px solid var(--neon-orange);
            border-radius: 20px;
            padding: 10px 5px;
            text-align: center;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(255, 107, 53, 0.3);
        }
        
        .stat-label {
            font-size: 12px;
            color: #ccc;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 3px;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: var(--neon-orange);
            font-family: 'CRIX Pixel', 'Courier New', monospace;
        }
        
        #coinCount {
            color: gold;
            text-shadow: 0 0 10px gold;
        }
        
        /* STORE & LOCKER BUTTONS */
        .button-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        
        .action-btn {
            background: linear-gradient(45deg, var(--neon-red), var(--neon-orange));
            color: white;
            border: 2px solid var(--matrix-green);
            border-radius: 30px;
            padding: 10px 25px;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'CRIX Pixel', 'Courier New', monospace;
            box-shadow: 0 5px 15px rgba(0, 255, 157, 0.3);
            flex: 1;
            min-width: 140px;
        }
        
        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px var(--matrix-green);
        }
        
        .action-btn.secondary {
            background: linear-gradient(45deg, var(--matrix-green), #00F0FF);
        }
        
        /* MODAL BASE STYLES */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(5px);
            z-index: 10000;
            overflow-y: auto;
            padding: 20px;
        }
        
        .modal.active {
            display: block;
        }
        
        .modal-content {
            max-width: 700px;
            margin: 30px auto;
            background: var(--dark-bg);
            border: 3px solid var(--neon-red);
            border-radius: 40px;
            padding: 25px;
            position: relative;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--matrix-green);
            padding-bottom: 10px;
        }
        
        .modal-title {
            font-size: 32px;
            color: var(--matrix-green);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'CRIX Pixel', 'Courier New', monospace;
        }
        
        .modal-close {
            background: transparent;
            border: 2px solid var(--neon-red);
            color: var(--neon-red);
            font-size: 28px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-close:hover {
            background: var(--neon-red);
            color: white;
            transform: rotate(90deg);
        }
        
        .modal-balance {
            text-align: center;
            font-size: 24px;
            color: gold;
            margin: 15px 0;
            padding: 15px;
            border: 2px solid gold;
            border-radius: 40px;
        }
        
        /* STORE GRID */
        .store-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 20px 0;
        }
        
        .store-section {
            background: rgba(20, 20, 30, 0.9);
            border: 2px solid var(--neon-orange);
            border-radius: 25px;
            padding: 15px;
        }
        
        .store-section-title {
            color: var(--neon-orange);
            font-size: 20px;
            text-align: center;
            margin-bottom: 15px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--neon-orange);
            padding-bottom: 5px;
        }
        
        .store-item {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid var(--neon-orange);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;
        }
        
        .store-item:hover {
            border-color: var(--matrix-green);
            transform: scale(1.02);
        }
        
        .store-item-image {
            width: 60px;
            height: 60px;
            object-fit: contain;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 5px;
        }
        
        .store-item-info {
            flex: 1;
        }
        
        .store-item-name {
            font-size: 18px;
            color: white;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        
        .store-item-price {
            font-size: 20px;
            color: gold;
            font-weight: bold;
        }
        
        .store-item-desc {
            font-size: 12px;
            color: #aaa;
        }
        
        .store-buy-btn {
            background: linear-gradient(45deg, var(--neon-red), var(--neon-orange));
            color: white;
            border: none;
            border-radius: 20px;
            padding: 8px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'CRIX Pixel', 'Courier New', monospace;
            transition: all 0.3s;
        }
        
        .store-buy-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--neon-orange);
        }
        
        .store-buy-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .store-buy-btn.owned {
            background: linear-gradient(45deg, var(--matrix-green), #00F0FF);
        }
        
        /* LOCKER GRID */
        .locker-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 20px 0;
        }
        
        .locker-section {
            background: rgba(20, 20, 30, 0.9);
            border: 2px solid var(--neon-orange);
            border-radius: 25px;
            padding: 15px;
        }
        
        .locker-section-title {
            color: var(--matrix-green);
            font-size: 20px;
            text-align: center;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        
        .locker-item {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid var(--neon-orange);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .locker-item:hover {
            border-color: var(--matrix-green);
            transform: translateX(5px);
        }
        
        .locker-item.equipped {
            border-color: gold;
            background: rgba(255, 215, 0, 0.1);
        }
        
        .locker-item-image {
            width: 50px;
            height: 50px;
            object-fit: contain;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 5px;
        }
        
        .locker-item-info {
            flex: 1;
        }
        
        .locker-item-name {
            font-size: 16px;
            color: white;
            text-transform: uppercase;
        }
        
        .locker-item-status {
            font-size: 12px;
            color: var(--matrix-green);
        }
        
        .powerup-timer {
            font-size: 12px;
            color: gold;
            margin-top: 5px;
        }
        
        /* PREVIEW CANVAS */
        .preview-container {
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid var(--neon-orange);
            border-radius: 30px;
        }
        
        .preview-title {
            color: var(--neon-orange);
            font-size: 18px;
            margin-bottom: 10px;
        }
        
        #previewCanvas {
            width: 150px;
            height: 150px;
            border: 2px solid var(--neon-orange);
            border-radius: 20px;
            background: linear-gradient(180deg, #1a1a2e 0%, #0a0a1a 100%);
            margin: 0 auto;
            display: block;
        }
        
        /* ACTIVE POWERUPS */
        .active-powerups {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 10px 0;
            flex-wrap: wrap;
            min-height: 40px;
        }
        
        .powerup-badge {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid gold;
            border-radius: 20px;
            padding: 5px 15px;
            font-size: 14px;
            color: gold;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .powerup-badge-timer {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 2px 8px;
            color: white;
        }
        
        /* GAME CONTROLS */
        .controls-box {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        
        .game-btn {
            background: linear-gradient(45deg, var(--neon-red), var(--neon-orange));
            color: white;
            border: 2px solid var(--matrix-green);
            border-radius: 30px;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'CRIX Pixel', 'Courier New', monospace;
            box-shadow: 0 5px 15px rgba(0, 255, 157, 0.3);
        }
        
        .game-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px var(--matrix-green);
        }
        
        .game-btn.secondary {
            background: linear-gradient(45deg, var(--matrix-green), #00F0FF);
        }
        
        /* INSTRUCTIONS */
        .instructions {
            text-align: center;
            margin: 15px 0;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid var(--neon-orange);
            border-radius: 30px;
        }
        
        .instructions p {
            color: #ccc;
            font-size: 14px;
            margin: 5px 0;
        }
        
        .instructions .highlight {
            color: var(--neon-orange);
        }
        
        /* BACK LINK */
        .back-link {
            text-align: center;
            margin-top: 15px;
        }
        
        .back-link a {
            color: var(--matrix-green);
            text-decoration: none;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 6px 20px;
            border: 2px solid var(--neon-red);
            border-radius: 30px;
            display: inline-block;
            transition: all 0.3s;
        }
        
        .back-link a:hover {
            border-color: var(--matrix-green);
            color: var(--neon-orange);
            transform: scale(1.05);
        }
        
        /* RESPONSIVE */
        @media (max-width: 500px) {
            .game-title { font-size: 36px; }
            .store-grid { grid-template-columns: 1fr; }
            .locker-grid { grid-template-columns: 1fr; }
            .store-item { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
    <!-- AUDIO PLAYERS -->
    <audio id="jumpSound" preload="auto">
        <source src="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/jump.mp3" type="audio/mpeg">
    </audio>
    
    <audio id="deathSound" preload="auto">
        <source src="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/death.mp3" type="audio/mpeg">
    </audio>
    
    <audio id="selectSound" preload="auto">
        <source src="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/select.mp3" type="audio/mpeg">
    </audio>
    
    <audio id="coinSound" preload="auto">
        <source src="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/coin.mp3" type="audio/mpeg">
    </audio>
    
    <audio id="purchaseSound" preload="auto">
        <source src="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/select.mp3" type="audio/mpeg">
    </audio>
    
    <audio id="powerupSound" preload="auto">
        <source src="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/powerup.mp3" type="audio/mpeg">
    </audio>
    
    <audio id="bgMusic" loop>
        <source src="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/music.mp3" type="audio/mpeg">
    </audio>
    
    <div class="game-container">
        <div class="game-header">
            <div class="game-title">FLAPPY CRIX</div>
            <div class="game-subtitle">collect coins • buy drip</div>
        </div>
        
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="400" height="600"></canvas>
        </div>
        
        <div class="stats-grid">
            <div class="cyber-stat">
                <div class="stat-label">SCORE</div>
                <div class="stat-value" id="gameScore">0</div>
            </div>
            <div class="cyber-stat">
                <div class="stat-label">COINS</div>
                <div class="stat-value" id="coinCount">🪙 0</div>
            </div>
            <div class="cyber-stat">
                <div class="stat-label">HIGH</div>
                <div class="stat-value" id="highScore">0</div>
            </div>
            <div class="cyber-stat">
                <div class="stat-label">MULT</div>
                <div class="stat-value" id="coinMultiplier">1x</div>
            </div>
        </div>
        
        <!-- ACTIVE POWERUPS DISPLAY -->
        <div class="active-powerups" id="activePowerups"></div>
        
        <!-- STORE & LOCKER BUTTONS -->
        <div class="button-container">
            <button class="action-btn" id="storeBtn">🛒 STORE</button>
            <button class="action-btn secondary" id="lockerBtn">👕 LOCKER</button>
            <button class="action-btn" id="musicToggleBtn">🔊 MUSIC</button>
        </div>
        
        <div class="controls-box">
            <button class="game-btn" id="startGameBtn">▶ START GAME</button>
        </div>
        
        <div class="instructions">
            <p><span class="highlight">⬆️ SPACE/CLICK</span> to flap • <span class="highlight">🪙 COLLECT COINS</span> for store</p>
        </div>
        
        <div class="back-link">
            <a href="https://crixgamingvr.vercel.app" target="_blank" id="backLink">← BACK TO MAIN SITE</a>
        </div>
    </div>
    
    <!-- STORE MODAL -->
    <div class="modal" id="storeModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">🛒 CRIX STORE</div>
                <button class="modal-close" id="closeStoreBtn">✕</button>
            </div>
            
            <div class="modal-balance" id="storeBalance">YOUR COINS: 🪙 0</div>
            
            <div class="store-grid">
                <!-- COSMETICS SECTION -->
                <div class="store-section">
                    <div class="store-section-title">👕 COSMETICS</div>
                    <div id="cosmeticsStore"></div>
                </div>
                
                <!-- POWERUPS SECTION -->
                <div class="store-section">
                    <div class="store-section-title">⚡ POWER-UPS</div>
                    <div id="powerupsStore"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- LOCKER MODAL -->
    <div class="modal" id="lockerModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">👕 CRIX LOCKER</div>
                <button class="modal-close" id="closeLockerBtn">✕</button>
            </div>
            
            <!-- PREVIEW SECTION -->
            <div class="preview-container">
                <div class="preview-title">YOUR CURRENT DRIP</div>
                <canvas id="previewCanvas" width="150" height="150"></canvas>
            </div>
            
            <div class="locker-grid">
                <!-- COSMETICS SECTION -->
                <div class="locker-section">
                    <div class="locker-section-title">🎨 YOUR COSMETICS</div>
                    <div id="cosmeticsLocker"></div>
                </div>
                
                <!-- POWERUPS SECTION -->
                <div class="locker-section">
                    <div class="locker-section-title">⚡ ACTIVE POWER-UPS</div>
                    <div id="powerupsLocker"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // ========== GAME VARIABLES ==========
        const canvas = document.getElementById('gameCanvas');
        const previewCanvas = document.getElementById('previewCanvas');
        const ctx = canvas.getContext('2d');
        const previewCtx = previewCanvas.getContext('2d');
        
        const gameScore = document.getElementById('gameScore');
        const coinCountEl = document.getElementById('coinCount');
        const highScoreEl = document.getElementById('highScore');
        const coinMultiplierEl = document.getElementById('coinMultiplier');
        const activePowerupsEl = document.getElementById('activePowerups');
        
        const startGameBtn = document.getElementById('startGameBtn');
        const musicToggle = document.getElementById('musicToggleBtn');
        const backLink = document.getElementById('backLink');
        
        // Modal elements
        const storeBtn = document.getElementById('storeBtn');
        const lockerBtn = document.getElementById('lockerBtn');
        const storeModal = document.getElementById('storeModal');
        const lockerModal = document.getElementById('lockerModal');
        const closeStoreBtn = document.getElementById('closeStoreBtn');
        const closeLockerBtn = document.getElementById('closeLockerBtn');
        const storeBalance = document.getElementById('storeBalance');
        const cosmeticsStore = document.getElementById('cosmeticsStore');
        const powerupsStore = document.getElementById('powerupsStore');
        const cosmeticsLocker = document.getElementById('cosmeticsLocker');
        const powerupsLocker = document.getElementById('powerupsLocker');
        
        // Sounds
        const jumpSound = document.getElementById('jumpSound');
        const deathSound = document.getElementById('deathSound');
        const selectSound = document.getElementById('selectSound');
        const coinSound = document.getElementById('coinSound');
        const purchaseSound = document.getElementById('purchaseSound');
        const powerupSound = document.getElementById('powerupSound');
        const bgMusic = document.getElementById('bgMusic');
        
        // Game state
        let gameRunning = false;
        let gameAnimationFrame;
        let highScore = localStorage.getItem('flappyCrixHighScore') || 0;
        let musicMuted = true;
        let musicWasPlaying = false;
        
        // Coin variables
        let coins = [];
        let coinCount = parseInt(localStorage.getItem('flappyCrixCoins')) || 0;
        let coinMultiplier = 1;
        const coinImage = new Image();
        coinImage.src = 'https://raw.githubusercontent.com/CRIX447/crix-website/main/img/coin.gif';
        
        // Bird image

        // ========== GAME CLASS ==========
        class FlappyBird {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.bird = {
                    x: 100,
                    y: 300,
                    width: 30,
                    height: 30,
                    velocity: 0,
                    gravity: 0.25,
                    jump: -6.5
                };
                
                this.pipes = [];
                this.pipeWidth = 50;
                this.pipeGap = 170;
                this.frameCount = 0;
                this.score = 0;
                this.gameOver = false;
                
                coins = [];
            }
            
            isCoinPositionSafe(x, y) {
                if (y < 40 || y > canvas.height - 40) return false;
                
                for (let pipe of this.pipes) {
                    if (Math.abs(x - pipe.x) < 60) {
                        if (y < pipe.top - 30 || y > pipe.bottom + 30) {
                            return false;
                        }
                    }
                }
                
                return true;
            }
            
            getSafeCoinY(x) {
                let attempts = 0;
                const maxAttempts = 50;
                
                while (attempts < maxAttempts) {
                    const y = Math.random() * (canvas.height - 80) + 40;
                    if (this.isCoinPositionSafe(x, y)) {
                        return y;
                    }
                    attempts++;
                }
                
                return canvas.height / 2;
            }
            
            draw() {
                // Clear canvas
                ctx.fillStyle = '#0A0A0F';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Draw grid
                ctx.strokeStyle = 'rgba(255, 70, 85, 0.1)';
                ctx.lineWidth = 1;
                for (let i = 0; i < canvas.width; i += 50) {
                    ctx.beginPath();
                    ctx.moveTo(i, 0);
                    ctx.lineTo(i, canvas.height);
                    ctx.stroke();
                }
                for (let i = 0; i < canvas.height; i += 50) {
                    ctx.beginPath();
                    ctx.moveTo(0, i);
                    ctx.lineTo(canvas.width, i);
                    ctx.stroke();
                }
                
                // Draw pipes
                ctx.fillStyle = '#00FF9D';
                ctx.shadowColor = '#00FF9D';
                ctx.shadowBlur = 10;
                this.pipes.forEach(pipe => {
                    this.roundRect(ctx, pipe.x, 0, this.pipeWidth, pipe.top, 15);
                    ctx.fill();
                    this.roundRect(ctx, pipe.x, pipe.bottom, this.pipeWidth, canvas.height - pipe.bottom, 15);
                    ctx.fill();
                });
                ctx.shadowBlur = 0;
                
                // Draw coins
                coins.forEach(coin => {
                    if (!coin.collected) {
                        if (coinImage.complete) {
                            ctx.drawImage(coinImage, coin.x - 15, coin.y - 15, 30, 30);
                        }
                    }
                });
                
                // Draw bird
                ctx.save();
                ctx.translate(this.bird.x, this.bird.y);
                
                let rotationAngle = Math.min(Math.max(this.bird.velocity * 0.1, -0.5), 0.5);
                ctx.rotate(rotationAngle);
                
                if (birdImage.complete) {
                    ctx.drawImage(birdImage, -15, -15, 30, 30);
                    
                    // Draw shirt
                    const shirtItem = cosmetics.find(i => i.type === 'shirt' && i.equipped);
                    if (shirtItem) {
                        const shirtImg = new Image();
                        shirtImg.src = shirtItem.image;
                        ctx.drawImage(shirtImg, -15, -15, 30, 30);
                    }
                    
                    // Draw hat
                    const hatItem = cosmetics.find(i => i.type === 'hat' && i.equipped);
                    if (hatItem) {
                        const hatImg = new Image();
                        hatImg.src = hatItem.image;
                        ctx.drawImage(hatImg, -15, -20, 30, 30);
                    }
                    
                    // Draw accessory
                    const accessoryItem = cosmetics.find(i => i.type === 'accessory' && i.equipped);
                    if (accessoryItem) {
                        const accessoryImg = new Image();
                        accessoryImg.src = accessoryItem.image;
                        ctx.drawImage(accessoryImg, -10, -15, 30, 30);
                    }
                }
                
                ctx.restore();
                
                // Draw shield effect if active
                const shieldActive = powerups.find(p => p.id === 'shield')?.active || false;
                if (shieldActive) {
                    ctx.beginPath();
                    ctx.arc(this.bird.x, this.bird.y, 25, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(0, 255, 157, 0.5)';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                }
                
                // Draw score
                if (!this.gameOver && gameRunning) {
                    ctx.fillStyle = '#FF6B35';
                    ctx.font = '20px "CRIX Pixel", monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText(`SCORE: ${this.score}`, canvas.width / 2, 50);
                }
                
                if (this.gameOver) {
                    ctx.fillStyle = '#FF4655';
                    ctx.font = '28px "CRIX Pixel", monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2);
                }
            }
            
            roundRect(ctx, x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                ctx.beginPath();
                ctx.moveTo(x + r, y);
                ctx.lineTo(x + w - r, y);
                ctx.quadraticCurveTo(x + w, y, x + w, y + r);
                ctx.lineTo(x + w, y + h - r);
                ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                ctx.lineTo(x + r, y + h);
                ctx.quadraticCurveTo(x, y + h, x, y + h - r);
                ctx.lineTo(x, y + r);
                ctx.quadraticCurveTo(x, y, x + r, y);
                ctx.closePath();
            }
            
            update() {
                if (this.gameOver) return;
                
                const shieldActive = powerups.find(p => p.id === 'shield')?.active || false;
                const magnetActive = powerups.find(p => p.id === 'magnet')?.active || false;
                
                // Bird physics
                this.bird.velocity += this.bird.gravity;
                this.bird.y += this.bird.velocity;
                
                // Check boundaries
                if (!shieldActive) {
                    if (this.bird.y < 10 || this.bird.y > canvas.height - 10) {
                        this.gameOver = true;
                        playDeathSound();
                        this.updateHighScore();
                    }
                } else {
                    if (this.bird.y < 10) {
                        this.bird.y = 10;
                        this.bird.velocity = Math.abs(this.bird.velocity) * 0.5;
                    }
                    if (this.bird.y > canvas.height - 10) {
                        this.bird.y = canvas.height - 10;
                        this.bird.velocity = -Math.abs(this.bird.velocity) * 0.5;
                    }
                }
                
                // Generate pipes
                if (this.frameCount % 120 === 0) {
                    const topHeight = Math.random() * (canvas.height - this.pipeGap - 150) + 70;
                    this.pipes.push({
                        x: canvas.width,
                        top: topHeight,
                        bottom: topHeight + this.pipeGap,
                        scored: false
                    });
                }
                
                // Generate coins
                if (this.frameCount % 40 === 0 && gameRunning) {
                    if (Math.random() < 0.4) {
                        const coinX = canvas.width + 40;
                        const coinY = this.getSafeCoinY(coinX);
                        
                        if (this.isCoinPositionSafe(coinX, coinY)) {
                            coins.push({
                                x: coinX,
                                y: coinY,
                                collected: false
                            });
                        }
                    }
                }
                
                // Update pipes
                let speed = 2.5;
                for (let i = this.pipes.length - 1; i >= 0; i--) {
                    this.pipes[i].x -= speed;
                    
                    if (!shieldActive) {
                        if (this.bird.x + 15 > this.pipes[i].x && 
                            this.bird.x - 15 < this.pipes[i].x + this.pipeWidth) {
                            if (this.bird.y - 15 < this.pipes[i].top || 
                                this.bird.y + 15 > this.pipes[i].bottom) {
                                this.gameOver = true;
                                playDeathSound();
                                this.updateHighScore();
                            }
                        }
                    }
                    
                    if (this.pipes[i].x + this.pipeWidth < this.bird.x && !this.pipes[i].scored) {
                        this.score++;
                        this.pipes[i].scored = true;
                        gameScore.textContent = this.score;
                    }
                    
                    if (this.pipes[i].x + this.pipeWidth < 0) {
                        this.pipes.splice(i, 1);
                    }
                }
                
                // Update coins with magnet effect
                for (let i = coins.length - 1; i >= 0; i--) {
                    if (!coins[i].collected) {
                        if (magnetActive) {
                            const dx = this.bird.x - coins[i].x;
                            const dy = this.bird.y - coins[i].y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < 100) {
                                coins[i].x += dx * 0.05;
                                coins[i].y += dy * 0.05;
                            }
                        }
                        
                        coins[i].x -= speed;
                        
                        const dist = Math.hypot(this.bird.x - coins[i].x, this.bird.y - coins[i].y);
                        if (dist < 30) {
                            coins[i].collected = true;
                            coinCount += coinMultiplier;
                            playCoinSound();
                            updateCoinDisplay();
                            localStorage.setItem('flappyCrixCoins', coinCount);
                        }
                        
                        if (coins[i].x + 30 < 0) {
                            coins.splice(i, 1);
                        }
                    } else {
                        coins.splice(i, 1);
                    }
                }
                
                this.frameCount++;
            }
            
            updateHighScore() {
                if (this.score > highScore) {
                    highScore = this.score;
                    localStorage.setItem('flappyCrixHighScore', highScore);
                    highScoreEl.textContent = highScore;
                }
            }
            
            jump() {
                if (this.gameOver || !gameRunning) return;
                this.bird.velocity = this.bird.jump;
                playJumpSound();
            }
        }
        
        let game = new FlappyBird();

            }
            musicMuted = !musicMuted;
            playSelectSound();
        });
        
        // ========== GAME LOOP ==========
        function gameLoop() {
            if (gameRunning) {
                game.update();
                game.draw();
                gameAnimationFrame = requestAnimationFrame(gameLoop);
            }
        }
        
        function startGame() {
            playSelectSound();
            game.reset();
            gameRunning = true;
            gameScore.textContent = '0';
            
            if (musicWasPlaying && musicMuted) {
                bgMusic.play();
                musicToggle.innerHTML = '🔊 MUSIC';
                musicMuted = false;
                musicWasPlaying = false;
            }
            
            if (gameAnimationFrame) cancelAnimationFrame(gameAnimationFrame);
            gameLoop();
        }
        
        // ========== EVENT LISTENERS ==========
        startGameBtn.addEventListener('click', startGame);
        
        storeBtn.addEventListener('click', openStore);
        lockerBtn.addEventListener('click', openLocker);
        
        closeStoreBtn.addEventListener('click', closeStore);
        closeLockerBtn.addEventListener('click', closeLocker);
        
        window.addEventListener('click', (e) => {
            if (e.target === storeModal) closeStore();
            if (e.target === lockerModal) closeLocker();
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                game.jump();
            }
        });
        
        canvas.addEventListener('click', () => {
            game.jump();
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            game.jump();
        });
        
        // Initial draw
        game.draw();
        updateActivePowerupsDisplay();
    </script>
</body>
</html>
