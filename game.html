<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLAPPY CRIX • CRIXGAMING VR</title>
    
    <style>
        @font-face {
            font-family: 'CRIX Pixel';
            src: url('https://raw.githubusercontent.com/CRIX447/crix-website/main/img/font.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'CRIX Pixel', 'Courier New', 'Lucida Console', 'Monaco', monospace;
            background: #0A0A0F;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            background-image: 
                linear-gradient(rgba(255, 70, 85, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 70, 85, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        
        .game-container {
            max-width: 480px;
            width: 100%;
            background: rgba(5, 5, 8, 0.95);
            border: 2px solid #FF4655;
            border-radius: 20px;
            padding: 15px;
        }
        
        .game-header {
            text-align: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #FF4655;
        }
        
        .game-title {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(45deg, #FF4655, #FF6B35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'CRIX Pixel', 'Courier New', monospace;
        }
        
        .game-subtitle {
            font-size: 10px;
            color: #00CC7A;
            background: rgba(0,0,0,0.4);
            padding: 4px 12px;
            display: inline-block;
            border-radius: 30px;
            border: 1px solid #FF6B35;
            font-family: 'CRIX Pixel', 'Courier New', monospace;
        }
        
        .canvas-wrapper {
            display: flex;
            justify-content: center;
            margin: 12px 0;
            padding: 8px;
            background: rgba(0,0,0,0.3);
            border: 1px solid #FF6B35;
            border-radius: 12px;
            cursor: pointer;
        }
        
        canvas {
            width: 100%;
            height: auto;
            border: 1px solid #FF6B35;
            border-radius: 8px;
            background: linear-gradient(180deg, #1a1a2e 0%, #0a0a1a 100%);
            cursor: pointer;
            display: block;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin: 12px 0;
        }
        
        .cyber-stat {
            background: rgba(10,10,15,0.85);
            border: 1px solid #FF6B35;
            border-radius: 8px;
            padding: 6px 3px;
            text-align: center;
            cursor: pointer;
        }
        
        .stat-label {
            font-size: 9px;
            color: #ccc;
            text-transform: uppercase;
            font-family: 'CRIX Pixel', 'Courier New', monospace;
        }
        
        .stat-value {
            font-size: 14px;
            font-weight: bold;
            color: #FF6B35;
            font-family: 'CRIX Pixel', 'Courier New', monospace;
        }
        
        #coinCount { color: gold; }
        
        .cheat-indicators, .active-powerups {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 8px 0;
        }
        
        .cheat-badge, .powerup-badge {
            background: rgba(0,0,0,0.7);
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 10px;
            font-family: 'CRIX Pixel', 'Courier New', monospace;
        }
        
        .cheat-badge.godmode { border: 1px solid #FF4655; color: #FF4655; }
        .cheat-badge.coinlord { border: 1px solid gold; color: gold; }
        .cheat-badge.slowmo { border: 1px solid #00CC7A; color: #00CC7A; }
        .cheat-badge.bigbird { border: 1px solid #FF6B35; color: #FF6B35; }
        .powerup-badge { border: 1px solid gold; color: gold; }
        .powerup-timer { background: #FF4655; border-radius: 12px; padding: 1px 5px; margin-left: 5px; font-size: 9px; }
        
        .buttons-row, .game-controls {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 8px 0;
            flex-wrap: wrap;
        }
        
        .action-btn, .game-btn {
            background: linear-gradient(45deg, #FF4655, #FF6B35);
            color: white;
            border: 1px solid gold;
            border-radius: 30px;
            padding: 8px 18px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'CRIX Pixel', 'Courier New', monospace;
            min-width: 90px;
        }
        
        .game-btn.secondary {
            background: linear-gradient(45deg, #00CC7A, #0099CC);
        }
        
        .action-btn:hover, .game-btn:hover {
            transform: scale(1.02);
        }
        
        .cheat-container {
            text-align: center;
            margin: 8px 0;
            opacity: 0.25;
        }
        
        .cheat-container:focus-within { opacity: 1; }
        
        .cheat-input {
            background: rgba(0,0,0,0.7);
            border: 1px solid #FF6B35;
            border-radius: 30px;
            padding: 6px 12px;
            font-family: 'CRIX Pixel', 'Courier New', monospace;
            color: #00CC7A;
            width: 110px;
            text-align: center;
            letter-spacing: 3px;
            font-size: 12px;
        }
        
        .instructions {
            text-align: center;
            margin: 8px 0;
            padding: 8px;
            background: rgba(0,0,0,0.3);
            border: 1px solid #FF6B35;
            border-radius: 12px;
        }
        
        .instructions p {
            color: #ccc;
            font-size: 10px;
            margin: 2px 0;
            font-family: 'CRIX Pixel', 'Courier New', monospace;
        }
        
        .highlight { color: #FF6B35; }
        
        .back-link {
            text-align: center;
            margin-top: 12px;
        }
        
        .back-link a {
            color: #00CC7A;
            text-decoration: none;
            font-size: 11px;
            padding: 5px 15px;
            border: 1px solid #FF4655;
            border-radius: 30px;
            font-family: 'CRIX Pixel', 'Courier New', monospace;
        }
        
        .store-modal, .locker-modal, .achievements-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 10000;
            padding: 15px;
            overflow-y: auto;
        }
        
        .store-modal.active, .locker-modal.active, .achievements-modal.active { display: block; }
        
        .modal-content {
            max-width: 450px;
            margin: 20px auto;
            background: #0A0A0F;
            border: 2px solid #FF4655;
            border-radius: 20px;
            padding: 15px;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            border-bottom: 1px solid gold;
            padding-bottom: 8px;
        }
        
        .modal-title {
            font-size: 20px;
            color: gold;
            text-transform: uppercase;
            font-family: 'CRIX Pixel', 'Courier New', monospace;
        }
        
        .modal-close {
            background: transparent;
            border: 1px solid #FF4655;
            color: #FF4655;
            font-size: 20px;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
        }
        
        .store-tabs {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 15px;
        }
        
        .store-tab {
            background: transparent;
            border: 1px solid #FF6B35;
            color: white;
            padding: 6px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 12px;
            font-family: 'CRIX Pixel', 'Courier New', monospace;
        }
        
        .store-tab.active { background: gold; color: black; border-color: gold; }
        
        .store-grid, .locker-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px;
            max-height: 350px;
            overflow-y: auto;
        }
        
        .store-item, .locker-item {
            background: rgba(20,20,30,0.9);
            border: 1px solid #FF6B35;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            position: relative;
        }
        
        .store-item img, .locker-item img { width: 50px; height: 50px; object-fit: contain; }
        .store-item-name { font-size: 10px; color: white; font-family: 'CRIX Pixel', 'Courier New', monospace; }
        .store-item-price { font-size: 13px; color: gold; margin: 5px 0; font-family: 'CRIX Pixel', 'Courier New', monospace; }
        
        .store-buy-btn {
            background: linear-gradient(45deg, #FF4655, #FF6B35);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 6px;
            cursor: pointer;
            width: 100%;
            font-size: 10px;
            font-family: 'CRIX Pixel', 'Courier New', monospace;
        }
        
        .locker-preview {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            border: 1px solid gold;
            border-radius: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .preview-canvas { width: 80px; height: 80px; border: 1px solid gold; border-radius: 8px; }
        .preview-info { text-align: center; }
        .preview-title { font-size: 12px; color: gold; font-family: 'CRIX Pixel', 'Courier New', monospace; }
        
        .equip-btn {
            background: #00CC7A;
            color: black;
            border: none;
            border-radius: 20px;
            padding: 5px 12px;
            cursor: pointer;
            font-size: 10px;
            margin: 3px;
            font-family: 'CRIX Pixel', 'Courier New', monospace;
        }
        
        .locker-section-title {
            font-size: 13px;
            color: #FF6B35;
            margin: 10px 0 8px;
            text-transform: uppercase;
            text-align: center;
            font-family: 'CRIX Pixel', 'Courier New', monospace;
        }
        
        .locker-item.equipped { border-color: #00CC7A; }
        
        .equipped-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #00CC7A;
            color: black;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .locker-balance {
            text-align: center;
            font-size: 14px;
            color: gold;
            margin: 10px 0;
            padding: 8px;
            border: 1px solid gold;
            border-radius: 30px;
            font-family: 'CRIX Pixel', 'Courier New', monospace;
        }
        
        .achievements-grid {
            display: grid;
            gap: 10px;
            max-height: 450px;
            overflow-y: auto;
        }
        
        .achievement-item {
            background: rgba(20,20,30,0.9);
            border: 1px solid #FF6B35;
            border-radius: 12px;
            padding: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .achievement-item.unlocked { border-color: gold; background: rgba(255,215,0,0.1); }
        .achievement-icon { font-size: 30px; }
        .achievement-name { font-size: 12px; color: white; font-family: 'CRIX Pixel', 'Courier New', monospace; }
        .achievement-desc { font-size: 9px; color: #aaa; font-family: 'CRIX Pixel', 'Courier New', monospace; }
        
        .event-overlay, .boom-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 15000;
            pointer-events: none;
        }
        
        .event-gif, .boom-gif { max-width: 150px; }
        
        .victory-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 20000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
        }
        
        .victory-overlay.active { display: flex; }
        .victory-title { font-size: 32px; color: gold; margin-bottom: 15px; font-family: 'CRIX Pixel', 'Courier New', monospace; }
        .victory-message { font-family: 'CRIX Pixel', 'Courier New', monospace; color: white; margin-bottom: 20px; }
        .victory-restart {
            background: linear-gradient(45deg, #FF4655, #FF6B35);
            color: white;
            border: 1px solid gold;
            border-radius: 30px;
            padding: 12px 30px;
            margin-top: 20px;
            cursor: pointer;
            font-family: 'CRIX Pixel', 'Courier New', monospace;
        }
        
        @media (max-width: 450px) {
            .stats-grid { gap: 4px; }
            .stat-value { font-size: 12px; }
            .action-btn, .game-btn { padding: 6px 12px; font-size: 10px; min-width: 70px; }
            .game-title { font-size: 26px; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <div class="game-title">FLAPPY CRIX</div>
            <div class="game-subtitle">tap • collect • drip</div>
        </div>
        
        <div class="canvas-wrapper" id="canvasWrapper">
            <canvas id="gameCanvas" width="400" height="600"></canvas>
        </div>
        
        <div class="stats-grid">
            <div class="cyber-stat" id="achievementsBtn">
                <div class="stat-label">🏆 ACHIEVEMENTS</div>
                <div class="stat-value" id="achievementCount">0/6</div>
            </div>
            <div class="cyber-stat">
                <div class="stat-label">COINS</div>
                <div class="stat-value" id="coinCount">🪙 0</div>
            </div>
            <div class="cyber-stat">
                <div class="stat-label">HIGH</div>
                <div class="stat-value" id="highScore">0</div>
            </div>
            <div class="cyber-stat">
                <div class="stat-label">MULT</div>
                <div class="stat-value" id="coinMultiplier">1x</div>
            </div>
        </div>
        
        <div class="cheat-indicators" id="cheatIndicators"></div>
        <div class="active-powerups" id="activePowerups"></div>
        
        <div class="buttons-row">
            <button class="action-btn" id="storeBtn">🛒 STORE</button>
            <button class="action-btn" id="lockerBtn">👕 LOCKER</button>
        </div>
        
        <div class="cheat-container">
            <input type="text" class="cheat-input" id="cheatInput" placeholder="????" maxlength="4" inputmode="numeric">
        </div>
        
        <div class="game-controls">
            <button class="game-btn" id="startGameBtn">▶ START</button>
            <button class="game-btn secondary" id="musicToggleBtn">🔊 MUSIC</button>
        </div>
        
        <div class="instructions">
            <p><span class="highlight">⬆️ TAP/SPACE</span> to jump • <span class="highlight">🪙 COLLECT COINS</span></p>
            <p><span class="highlight">🏆 UNLOCK ACHIEVEMENTS</span></p>
        </div>
        
        <div class="back-link">
            <a href="https://crixgamingvr.vercel.app" target="_blank">← BACK TO MAIN SITE</a>
        </div>
    </div>
    
    <!-- MODALS -->
    <div class="store-modal" id="storeModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">🛒 STORE</div>
                <button class="modal-close" id="closeStoreBtn">✕</button>
            </div>
            <div class="store-tabs">
                <button class="store-tab active" id="tabPowerupsStore">⚡ POWER-UPS</button>
                <button class="store-tab" id="tabCosmeticsStore">👕 COSMETICS</button>
            </div>
            <div id="storePowerups"><div class="store-grid" id="powerupsStoreGrid"></div></div>
            <div id="storeCosmetics" style="display:none;"><div class="store-grid" id="cosmeticsStoreGrid"></div></div>
        </div>
    </div>
    
    <div class="locker-modal" id="lockerModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">👕 LOCKER</div>
                <button class="modal-close" id="closeLockerBtn">✕</button>
            </div>
            <div class="locker-balance" id="lockerBalance">🪙 0</div>
            <div class="locker-preview">
                <canvas id="previewCanvas" width="120" height="120" class="preview-canvas"></canvas>
                <div class="preview-info">
                    <div class="preview-title" id="previewTitle">YOUR DRIP</div>
                    <div class="preview-equip">
                        <button class="equip-btn" id="unequipHat">🧢 UNEQUIP HAT</button>
                        <button class="equip-btn" id="unequipShirt">👕 UNEQUIP SHIRT</button>
                    </div>
                </div>
            </div>
            <div class="locker-section">
                <div class="locker-section-title">🧢 HATS</div>
                <div class="locker-grid" id="lockerHats"></div>
            </div>
            <div class="locker-section">
                <div class="locker-section-title">👕 SHIRTS</div>
                <div class="locker-grid" id="lockerShirts"></div>
            </div>
        </div>
    </div>
    
    <div class="achievements-modal" id="achievementsModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">🏆 ACHIEVEMENTS</div>
                <button class="modal-close" id="closeAchievementsBtn">✕</button>
            </div>
            <div class="achievements-grid" id="achievementsGrid"></div>
        </div>
    </div>
    
    <div id="eventOverlay" class="event-overlay" style="display:none;"></div>
    <div id="boomOverlay" class="boom-overlay" style="display:none;"></div>
    <div class="victory-overlay" id="victoryOverlay">
        <div class="victory-title">🎉 VICTORY! 🎉</div>
        <div class="victory-message" id="victoryMessage"></div>
        <button class="victory-restart" id="victoryRestart">PLAY AGAIN</button>
    </div>
    
    <!-- AUDIO -->
    <audio id="jumpSound" preload="auto"><source src="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/jump.mp3" type="audio/mpeg"></audio>
    <audio id="deathSound" preload="auto"><source src="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/death.mp3" type="audio/mpeg"></audio>
    <audio id="coinSound" preload="auto"><source src="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/coin.mp3" type="audio/mpeg"></audio>
    <audio id="selectSound" preload="auto"><source src="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/select.mp3" type="audio/mpeg"></audio>
    <audio id="powerupSound" preload="auto"><source src="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/powerup.mp3" type="audio/mpeg"></audio>
    <audio id="victorySound" preload="auto"><source src="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/victory.mp3" type="audio/mpeg"></audio>
    <audio id="sixtySevenSound" preload="auto"><source src="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/67.mp3" type="audio/mpeg"></audio>
    <audio id="boomSound" preload="auto"><source src="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/boom.mp3" type="audio/mpeg"></audio>
    <audio id="achSound" preload="auto"><source src="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/ach.mp3" type="audio/mpeg"></audio>
    <audio id="bgMusic" loop preload="auto"><source src="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/music.mp3" type="audio/mpeg"></audio>
    
    <script>
        // DOM elements
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game state
        let gameRunning = false;
        let animationId = null;
        let highScore = 0;
        let coinCount = 0;
        let coinMultiplier = 1;
        let musicMuted = true;
        let gamesPlayed = 0;
        let hasTriggered67 = false;
        let hasTriggered1000 = false;
        
        // Cheats
        let cheats = { godmode: false, coinlord: false, slowmo: false, bigbird: false };
        
        // Game objects
        let bird = { x: 100, y: 300, width: 30, height: 30, velocity: 0, gravity: 0.25, jump: -6.5, visible: true };
        let pipes = [];
        let coins = [];
        let score = 0;
        let gameOver = false;
        let frameCount = 0;
        let pipeGap = 170;
        let pipeWidth = 50;
        let gameSpeed = 2.5;
        
        // Images
        const coinImage = new Image(); 
        coinImage.src = 'https://raw.githubusercontent.com/CRIX447/crix-website/main/img/coin.gif';
        coinImage.onload = () => { console.log('Coin GIF loaded'); drawGame(); };
        
        const birdImage = new Image(); 
        birdImage.src = 'https://raw.githubusercontent.com/CRIX447/crix-website/main/img/bird.png';
        
        // Powerups
        let powerups = [
            { id: 'x2coins', name: '2X COINS', price: 100, duration: 30, active: false, timeLeft: 0, timer: null, desc: 'Double coins for 30s' },
            { id: 'shield', name: 'SHIELD', price: 75, duration: 20, active: false, timeLeft: 0, timer: null, desc: 'Invincible for 20s' },
            { id: 'magnet', name: 'MAGNET', price: 60, duration: 15, active: false, timeLeft: 0, timer: null, desc: 'Coins attract for 15s' }
        ];
        
        // Cosmetics
        let cosmetics = [
            { id: 'bucket', name: 'BUCKET HAT', type: 'hat', price: 50, image: 'https://raw.githubusercontent.com/CRIX447/crix-website/main/img/bucket-hat.avif', owned: false, equipped: false },
            { id: 'cap', name: 'BASEBALL CAP', type: 'hat', price: 45, image: 'https://raw.githubusercontent.com/CRIX447/crix-website/main/img/cap.png', owned: false, equipped: false },
            { id: 'tank', name: 'TANK TOP', type: 'shirt', price: 40, image: 'https://raw.githubusercontent.com/CRIX447/crix-website/main/img/tank-top.avif', owned: false, equipped: false },
            { id: 'tshirt', name: 'T-SHIRT', type: 'shirt', price: 35, image: 'https://raw.githubusercontent.com/CRIX447/crix-website/main/img/new-t-shirt.png', owned: false, equipped: false }
        ];
        
        // Achievements
        let achievements = [
            { id: 'first', name: 'FIRST FLIGHT', desc: 'Play your first game', icon: '🐣', unlocked: false, progress: 0, target: 1 },
            { id: 'collector', name: 'COIN COLLECTOR', desc: 'Collect 100 coins', icon: '🪙', unlocked: false, progress: 0, target: 100 },
            { id: 'score50', name: 'SCORE 50', desc: 'Reach a score of 50', icon: '50', unlocked: false, progress: 0, target: 50 },
            { id: 'score100', name: 'SCORE 100', desc: 'Reach a score of 100', icon: '💯', unlocked: false, progress: 0, target: 100 },
            { id: 'mystery', name: 'MYSTERY LEVEL', desc: 'Find the secret', icon: '❓', unlocked: false, progress: 0, target: 1 },
            { id: 'legend', name: 'LEGEND', desc: 'Reach level 1000', icon: '👑', unlocked: false, progress: 0, target: 1 }
        ];
        
        // Sounds
        const jumpSound = document.getElementById('jumpSound');
        const deathSound = document.getElementById('deathSound');
        const coinSound = document.getElementById('coinSound');
        const selectSound = document.getElementById('selectSound');
        const powerupSound = document.getElementById('powerupSound');
        const victorySound = document.getElementById('victorySound');
        const sixtySevenSound = document.getElementById('sixtySevenSound');
        const boomSound = document.getElementById('boomSound');
        const achSound = document.getElementById('achSound');
        const bgMusic = document.getElementById('bgMusic');
        
        // Set volume for all sounds
        if (jumpSound) jumpSound.volume = 0.4;
        if (deathSound) deathSound.volume = 0.5;
        if (coinSound) coinSound.volume = 0.3;
        if (selectSound) selectSound.volume = 0.3;
        if (powerupSound) powerupSound.volume = 0.4;
        if (victorySound) victorySound.volume = 0.5;
        if (sixtySevenSound) sixtySevenSound.volume = 0.5;
        if (boomSound) boomSound.volume = 0.6;
        if (achSound) achSound.volume = 0.4;
        if (bgMusic) bgMusic.volume = 0.3;
        
        // Local storage
        function saveToLocal() { 
            localStorage.setItem('flappyCrixHighScore', highScore); 
            localStorage.setItem('flappyCrixCoins', coinCount); 
            localStorage.setItem('flappyCrixOwned', JSON.stringify(cosmetics.filter(c=>c.owned).map(c=>c.id))); 
            localStorage.setItem('flappyCrixEquipped', JSON.stringify({ hat: cosmetics.find(c=>c.type==='hat'&&c.equipped)?.id || null, shirt: cosmetics.find(c=>c.type==='shirt'&&c.equipped)?.id || null })); 
        }
        
        function loadFromLocal() { 
            highScore = parseInt(localStorage.getItem('flappyCrixHighScore')) || 0; 
            coinCount = parseInt(localStorage.getItem('flappyCrixCoins')) || 0; 
            let owned = JSON.parse(localStorage.getItem('flappyCrixOwned')||'[]'); 
            cosmetics.forEach(c=>c.owned = owned.includes(c.id)); 
            let eq = JSON.parse(localStorage.getItem('flappyCrixEquipped')||'{}'); 
            cosmetics.forEach(c=>{ if(c.type==='hat' && eq.hat===c.id) c.equipped=true; if(c.type==='shirt' && eq.shirt===c.id) c.equipped=true; }); 
            document.getElementById('highScore').textContent = highScore; 
            updateCoinDisplay(); 
            updateAchievementCount(); 
            updateLockerDisplay(); 
            updatePreview(); 
        }
        
        // Game functions
        function resetGame() {
            bird = { x: 100, y: 300, width: 30, height: 30, velocity: 0, gravity: cheats.slowmo ? 0.15 : 0.25, jump: cheats.slowmo ? -5 : -6.5, visible: true };
            pipes = [];
            coins = [];
            score = 0;
            gameOver = false;
            frameCount = 0;
            hasTriggered67 = false;
            hasTriggered1000 = false;
            gameSpeed = cheats.slowmo ? 1.5 : 2.5;
            if (document.getElementById('gameScore')) document.getElementById('gameScore').textContent = '0';
        }
        
        function updateGame() {
            if (gameOver || !gameRunning) return;
            
            const shieldActive = powerups.find(p => p.id === 'shield')?.active || cheats.godmode;
            
            // Bird physics
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;
            
            // Boundaries
            if (!shieldActive) {
                if (bird.y < 10 || bird.y > canvas.height - 10) { 
                    gameOver = true; 
                    if (deathSound) deathSound.play().catch(e=>console.log('Death sound error'));
                    if (bgMusic && !musicMuted) bgMusic.pause();
                    updateHighScore(); 
                    return;
                }
            } else {
                if (bird.y < 10) { bird.y = 10; bird.velocity = Math.abs(bird.velocity) * 0.5; }
                if (bird.y > canvas.height - 10) { bird.y = canvas.height - 10; bird.velocity = -Math.abs(bird.velocity) * 0.5; }
            }
            
            // Spawn pipes
            let pipeRate = cheats.slowmo ? 180 : 120;
            if (frameCount % pipeRate === 0) {
                let topHeight = Math.random() * (canvas.height - pipeGap - 150) + 70;
                pipes.push({ x: canvas.width, top: topHeight, bottom: topHeight + pipeGap, scored: false });
            }
            
            // Spawn coins - FIXED: more reliable
            let coinRate = cheats.coinlord ? 30 : 60;
            if (frameCount % coinRate === 0) {
                let coinY = Math.random() * (canvas.height - 100) + 50;
                coins.push({ x: canvas.width, y: coinY, collected: false });
            }
            
            // Update pipes
            for (let i = 0; i < pipes.length; i++) {
                pipes[i].x -= gameSpeed;
                if (!shieldActive && bird.x + 15 > pipes[i].x && bird.x - 15 < pipes[i].x + pipeWidth) {
                    if (bird.y - 15 < pipes[i].top || bird.y + 15 > pipes[i].bottom) {
                        gameOver = true; 
                        if (deathSound) deathSound.play().catch(e=>console.log('Death sound error'));
                        if (bgMusic && !musicMuted) bgMusic.pause();
                        updateHighScore(); 
                        return;
                    }
                }
                if (pipes[i].x + pipeWidth < bird.x && !pipes[i].scored) {
                    score++; 
                    pipes[i].scored = true;
                    if (document.getElementById('gameScore')) document.getElementById('gameScore').textContent = score;
                    if (score === 67 && !hasTriggered67) trigger67();
                    if (score === 1000 && !hasTriggered1000) trigger1000();
                    checkAchievements();
                }
                if (pipes[i].x + pipeWidth < 0) pipes.splice(i--, 1);
            }
            
            // Update coins
            for (let i = 0; i < coins.length; i++) {
                coins[i].x -= gameSpeed;
                
                // Coin collision
                if (!coins[i].collected && 
                    bird.x + 15 > coins[i].x && 
                    bird.x - 15 < coins[i].x + 20 &&
                    bird.y + 15 > coins[i].y && 
                    bird.y - 15 < coins[i].y + 20) {
                    coins[i].collected = true;
                    coinCount += coinMultiplier;
                    if (coinSound) coinSound.play().catch(e=>console.log('Coin sound error'));
                    updateCoinDisplay();
                    checkAchievements();
                    saveToLocal();
                }
                if (coins[i].x + 20 < 0) coins.splice(i--, 1);
            }
            
            frameCount++;
        }
        
        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Grid
            ctx.strokeStyle = 'rgba(255,70,85,0.08)';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 50) { 
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke(); 
            }
            for (let i = 0; i < canvas.height; i += 50) { 
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke(); 
            }
            
            // Pipes
            ctx.fillStyle = '#00CC7A';
            for (let p of pipes) { 
                ctx.fillRect(p.x, 0, pipeWidth, p.top); 
                ctx.fillRect(p.x, p.bottom, pipeWidth, canvas.height - p.bottom); 
            }
            
            // Coins - Animated GIF
            for (let c of coins) { 
                if (!c.collected) {
                    if (coinImage.complete && coinImage.naturalWidth > 0) {
                        ctx.drawImage(coinImage, c.x, c.y, 20, 20);
                    } else {
                        ctx.fillStyle = 'gold';
                        ctx.beginPath();
                        ctx.arc(c.x + 10, c.y + 10, 10, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#FF6B35';
                        ctx.font = '12px monospace';
                        ctx.fillText('🪙', c.x + 5, c.y + 15);
                    }
                }
            }
            
            // Bird
            if (bird.visible) {
                ctx.save(); 
                ctx.translate(bird.x, bird.y);
                let rot = Math.min(Math.max(bird.velocity * 0.1, -0.5), 0.5);
                ctx.rotate(rot);
                if (birdImage.complete && birdImage.naturalWidth > 0) {
                    ctx.drawImage(birdImage, -15, -15, 30, 30);
                } else {
                    ctx.fillStyle = '#FF6B35';
                    ctx.fillRect(-15, -15, 30, 30);
                    ctx.fillStyle = 'white';
                    ctx.fillRect(-8, -10, 5, 5);
                    ctx.fillRect(3, -10, 5, 5);
                }
                // Cosmetics
                const shirt = cosmetics.find(c => c.type === 'shirt' && c.equipped);
                if (shirt) { 
                    let img = new Image(); 
                    img.src = shirt.image; 
                    ctx.drawImage(img, -15, -15, 30, 30); 
                }
                const hat = cosmetics.find(c => c.type === 'hat' && c.equipped);
                if (hat) { 
                    let img = new Image(); 
                    img.src = hat.image; 
                    ctx.drawImage(img, -15, -20, 30, 30); 
                }
                ctx.restore();
            }
            
            // UI Text
            if (!gameOver && gameRunning) {
                ctx.fillStyle = '#FF6B35'; 
                ctx.font = '20px "CRIX Pixel", "Courier New", monospace'; 
                ctx.textAlign = 'center';
                ctx.fillText(`SCORE: ${score}`, canvas.width/2, 50);
            }
            if (gameOver) {
                ctx.fillStyle = '#FF4655'; 
                ctx.font = '24px "CRIX Pixel", "Courier New", monospace'; 
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2);
                ctx.font = '14px "CRIX Pixel", "Courier New", monospace'; 
                ctx.fillText('Press START', canvas.width/2, canvas.height/2 + 40);
            }
        }
        
        function gameLoop() {
            if (gameRunning) {
                updateGame();
                drawGame();
                animationId = requestAnimationFrame(gameLoop);
            }
        }
        
        function startGame() {
            if (gameRunning) {
                if (animationId) cancelAnimationFrame(animationId);
                resetGame();
            }
            gameRunning = true;
            gameOver = false;
            gamesPlayed++;
            if (animationId) cancelAnimationFrame(animationId);
            animationId = requestAnimationFrame(gameLoop);
            if (!musicMuted && bgMusic) {
                bgMusic.currentTime = 0;
                bgMusic.play().catch(e=>console.log('Music error'));
            }
            // Play select sound for start button
            if (selectSound) selectSound.play().catch(e=>console.log('Select sound error'));
            checkAchievements();
        }
        
        function jump() {
            if (!gameRunning || gameOver) return;
            bird.velocity = bird.jump;
            if (jumpSound) jumpSound.play().catch(e=>console.log('Jump sound error'));
        }
        
        function updateHighScore() {
            if (score > highScore) { 
                highScore = score; 
                document.getElementById('highScore').textContent = highScore; 
                saveToLocal();
            }
        }
        
        // Helper functions
        function updateCoinDisplay() { 
            document.getElementById('coinCount').innerHTML = `🪙 ${coinCount}`; 
            if(document.getElementById('lockerBalance')) document.getElementById('lockerBalance').innerHTML = `🪙 ${coinCount}`; 
        }
        
        function checkAchievements() {
            let unlocked = false;
            if (!achievements[0].unlocked && gamesPlayed >= 1) { achievements[0].unlocked = true; unlocked = true; }
            if (!achievements[1].unlocked) { achievements[1].progress = Math.min(coinCount, 100); if (coinCount >= 100) { achievements[1].unlocked = true; unlocked = true; } }
            if (!achievements[2].unlocked && score >= 50) { achievements[2].unlocked = true; unlocked = true; }
            if (!achievements[3].unlocked && score >= 100) { achievements[3].unlocked = true; unlocked = true; }
            if (!achievements[4].unlocked && hasTriggered67) { achievements[4].unlocked = true; unlocked = true; }
            if (!achievements[5].unlocked && hasTriggered1000) { achievements[5].unlocked = true; unlocked = true; }
            if (unlocked) { 
                if (achSound) achSound.play().catch(e=>console.log('Ach sound error'));
                updateAchievementCount(); 
                saveToLocal();
            }
        }
        
        function updateAchievementCount() { 
            let u = achievements.filter(a => a.unlocked).length; 
            document.getElementById('achievementCount').textContent = `${u}/${achievements.length}`; 
        }
        
        function updateCheatIndicators() { 
            let html = ''; 
            if (cheats.godmode) html += '<div class="cheat-badge godmode">⚡ GODMODE</div>';
            if (cheats.coinlord) html += '<div class="cheat-badge coinlord">💰 COIN LORD</div>';
            if (cheats.slowmo) html += '<div class="cheat-badge slowmo">⏱️ SLOW MO</div>';
            if (cheats.bigbird) html += '<div class="cheat-badge bigbird">🦅 BIG BIRD</div>';
            document.getElementById('cheatIndicators').innerHTML = html;
        }
        
        function updateActivePowerups() { 
            let active = powerups.filter(p => p.active); 
            let html = ''; 
            active.forEach(p => { html += `<div class="powerup-badge">${p.name} <span class="powerup-timer">${p.timeLeft}s</span></div>`; });
            document.getElementById('activePowerups').innerHTML = html;
        }
        
        function trigger67() { 
            hasTriggered67 = true; 
            if (sixtySevenSound) sixtySevenSound.play().catch(e=>console.log('67 sound error'));
            let ov = document.getElementById('eventOverlay'); 
            ov.style.display = 'block'; 
            ov.innerHTML = '<img src="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/67.gif" class="event-gif">'; 
            setTimeout(() => { ov.style.display = 'none'; ov.innerHTML = ''; }, 3000); 
        }
        
        function trigger1000() { 
            hasTriggered1000 = true; 
            gameRunning = false; 
            if (animationId) cancelAnimationFrame(animationId);
            let boom = document.getElementById('boomOverlay'); 
            boom.style.display = 'flex'; 
            boom.innerHTML = '<img src="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/boom.gif" class="boom-gif">'; 
            if (boomSound) boomSound.play().catch(e=>console.log('Boom sound error'));
            setTimeout(() => { 
                boom.style.display = 'none'; 
                let msg = Object.values(cheats).some(v=>v) ? 'YOU DID IT! ...AND MAYBE USED SOME HELP? 😈\nThanks for playing!' : 'VICTORY! YOU CONQUERED FLAPPY CRIX!\nThanks for playing!'; 
                document.getElementById('victoryMessage').innerHTML = msg; 
                document.getElementById('victoryOverlay').classList.add('active'); 
                if (victorySound) victorySound.play().catch(e=>console.log('Victory sound error'));
            }, 2000);
        }
        
        // UI functions
        function updateStoreDisplay() { 
            let phtml = ''; 
            powerups.forEach(p => { phtml += `<div class="store-item"><div class="store-item-name">⚡ ${p.name}</div><div class="store-item-desc">${p.desc}</div><div class="store-item-price">🪙 ${p.price}</div><button class="store-buy-btn" onclick="buyPowerup('${p.id}')" ${p.active ? 'disabled' : ''}>${p.active ? 'ACTIVE' : 'BUY'}</button></div>`; }); 
            document.getElementById('powerupsStoreGrid').innerHTML = phtml; 
            let chtml = ''; 
            cosmetics.forEach(c => { chtml += `<div class="store-item ${c.owned ? 'owned' : ''}"><img src="${c.image}"><div class="store-item-name">${c.name}</div><div class="store-item-price">🪙 ${c.price}</div><button class="store-buy-btn" onclick="buyCosmetic('${c.id}')" ${c.owned ? 'disabled' : ''}>${c.owned ? 'OWNED' : 'BUY'}</button></div>`; }); 
            document.getElementById('cosmeticsStoreGrid').innerHTML = chtml; 
        }
        
        function updateLockerDisplay() { 
            let hatsHtml = ''; 
            cosmetics.filter(c=>c.type==='hat'&&c.owned).forEach(h=>{ hatsHtml += `<div class="locker-item ${h.equipped ? 'equipped' : ''}" onclick="equipItem('${h.id}')"><img src="${h.image}"><div class="locker-item-name">${h.name}</div>${h.equipped ? '<div class="equipped-badge">✓</div>' : ''}</div>`; }); 
            document.getElementById('lockerHats').innerHTML = hatsHtml || '<div style="grid-column:1/-1; text-align:center;">No hats owned</div>'; 
            let shirtsHtml = ''; 
            cosmetics.filter(c=>c.type==='shirt'&&c.owned).forEach(s=>{ shirtsHtml += `<div class="locker-item ${s.equipped ? 'equipped' : ''}" onclick="equipItem('${s.id}')"><img src="${s.image}"><div class="locker-item-name">${s.name}</div>${s.equipped ? '<div class="equipped-badge">✓</div>' : ''}</div>`; }); 
            document.getElementById('lockerShirts').innerHTML = shirtsHtml || '<div style="grid-column:1/-1; text-align:center;">No shirts owned</div>'; 
            document.getElementById('lockerBalance').innerHTML = `🪙 ${coinCount}`; 
        }
        
        function updatePreview() { 
            let previewCtx = document.getElementById('previewCanvas').getContext('2d');
            previewCtx.clearRect(0,0,120,120); 
            previewCtx.fillStyle = '#0A0A0F'; 
            previewCtx.fillRect(0,0,120,120); 
            previewCtx.save(); 
            previewCtx.translate(60,60); 
            let size = cheats.bigbird ? 45 : 35; 
            if(birdImage.complete && birdImage.naturalWidth > 0) previewCtx.drawImage(birdImage, -size/2, -size/2, size, size); 
            let shirt = cosmetics.find(c=>c.type==='shirt'&&c.equipped); 
            if(shirt){ let img=new Image(); img.src=shirt.image; previewCtx.drawImage(img, -size/2, -size/2, size, size); } 
            let hat = cosmetics.find(c=>c.type==='hat'&&c.equipped); 
            if(hat){ let img=new Image(); img.src=hat.image; previewCtx.drawImage(img, -size/2, -size/2-5, size, size); } 
            previewCtx.restore(); 
            document.getElementById('previewTitle').textContent = (hat||shirt) ? 'CURRENT DRIP' : 'NO DRIP EQUIPPED'; 
        }
        
        window.buyPowerup = function(id) { 
            let p = powerups.find(p=>p.id===id); 
            if(!p||p.active||coinCount<p.price) return; 
            coinCount -= p.price; 
            updateCoinDisplay(); 
            p.active = true; 
            p.timeLeft = p.duration; 
            if (powerupSound) powerupSound.play().catch(e=>console.log('Powerup sound error'));
            if(id==='x2coins') coinMultiplier=2; 
            let interval = setInterval(()=>{ 
                p.timeLeft--; 
                if(p.timeLeft<=0){ 
                    p.active=false; 
                    clearInterval(interval); 
                    if(id==='x2coins') coinMultiplier=1; 
                    updateActivePowerups(); 
                    saveToLocal();
                } 
                updateActivePowerups(); 
            }, 1000); 
            updateActivePowerups(); 
            updateStoreDisplay(); 
            saveToLocal();
        };
        
        window.buyCosmetic = function(id) { 
            let c = cosmetics.find(c=>c.id===id); 
            if(!c||c.owned||coinCount<c.price) return; 
            coinCount -= c.price; 
            c.owned = true; 
            updateCoinDisplay(); 
            if (selectSound) selectSound.play().catch(e=>console.log('Select sound error'));
            updateStoreDisplay(); 
            updateLockerDisplay(); 
            saveToLocal();
        };
        
        window.equipItem = function(id) { 
            let item = cosmetics.find(c=>c.id===id); 
            if(!item||!item.owned) return; 
            cosmetics.forEach(c=>{ if(c.type===item.type && c.equipped) c.equipped=false; }); 
            item.equipped=true; 
            updateLockerDisplay(); 
            updatePreview(); 
            if (selectSound) selectSound.play().catch(e=>console.log('Select sound error'));
            saveToLocal();
        };
        
        // Event listeners
        document.getElementById('startGameBtn').addEventListener('click', startGame);
        document.getElementById('musicToggleBtn').addEventListener('click', () => { 
            musicMuted = !musicMuted; 
            if(!musicMuted && bgMusic) {
                bgMusic.currentTime = 0;
                bgMusic.play().catch(e=>console.log('Music error')); 
            } else if (bgMusic) {
                bgMusic.pause(); 
            }
            if (selectSound) selectSound.play().catch(e=>console.log('Select sound error'));
        });
        document.getElementById('storeBtn').addEventListener('click', () => { updateStoreDisplay(); document.getElementById('storeModal').classList.add('active'); });
        document.getElementById('closeStoreBtn').addEventListener('click', () => { document.getElementById('storeModal').classList.remove('active'); });
        document.getElementById('lockerBtn').addEventListener('click', () => { updateLockerDisplay(); document.getElementById('lockerModal').classList.add('active'); });
        document.getElementById('closeLockerBtn').addEventListener('click', () => { document.getElementById('lockerModal').classList.remove('active'); });
        document.getElementById('achievementsBtn').addEventListener('click', () => { 
            let g = document.getElementById('achievementsGrid'); 
            let h = ''; 
            achievements.forEach(a => { 
                h += `<div class="achievement-item ${a.unlocked ? 'unlocked' : ''}"><div class="achievement-icon">${a.icon}</div><div><div class="achievement-name">${a.name}</div><div class="achievement-desc">${a.desc}</div>${a.target>1&&!a.unlocked?`<div class="achievement-progress">${a.progress}/${a.target}</div>`:''}</div>${a.unlocked?'<div>✓</div>':''}</div>`; 
            }); 
            g.innerHTML = h; 
            document.getElementById('achievementsModal').classList.add('active'); 
        });
        document.getElementById('closeAchievementsBtn').addEventListener('click', () => { document.getElementById('achievementsModal').classList.remove('active'); });
        document.getElementById('unequipHat').addEventListener('click', () => { 
            let hat = cosmetics.find(c=>c.type==='hat'&&c.equipped); 
            if(hat){ hat.equipped=false; updateLockerDisplay(); updatePreview(); saveToLocal(); } 
        });
        document.getElementById('unequipShirt').addEventListener('click', () => { 
            let shirt = cosmetics.find(c=>c.type==='shirt'&&c.equipped); 
            if(shirt){ shirt.equipped=false; updateLockerDisplay(); updatePreview(); saveToLocal(); } 
        });
        document.getElementById('victoryRestart').addEventListener('click', () => { 
            document.getElementById('victoryOverlay').classList.remove('active'); 
            startGame(); 
        });
        document.getElementById('canvasWrapper').addEventListener('click', jump);
        document.getElementById('canvasWrapper').addEventListener('touchstart', (e) => { e.preventDefault(); jump(); });
        document.addEventListener('keydown', (e) => { if(e.key === ' ' || e.key === 'Space') { e.preventDefault(); jump(); } });
        
        document.getElementById('cheatInput').addEventListener('input', (e) => {
            let code = e.target.value;
            if(code.length === 4) {
                if(code === '6969') { cheats.godmode = !cheats.godmode; alert(cheats.godmode ? 'Godmode ON' : 'Godmode OFF'); updateCheatIndicators(); }
                if(code === '1337') { cheats.coinlord = !cheats.coinlord; alert(cheats.coinlord ? 'Coin Lord ON' : 'Coin Lord OFF'); updateCheatIndicators(); if(gameRunning) resetGame(); }
                if(code === '0420') { cheats.slowmo = !cheats.slowmo; alert(cheats.slowmo ? 'Slow Mo ON' : 'Slow Mo OFF'); updateCheatIndicators(); gameSpeed = cheats.slowmo ? 1.5 : 2.5; if(gameRunning) resetGame(); }
                if(code === '8008') { cheats.bigbird = !cheats.bigbird; alert(cheats.bigbird ? 'Big Bird ON' : 'Big Bird OFF'); updateCheatIndicators(); updatePreview(); if(gameRunning) resetGame(); }
                if(code === '2468') { let x2 = powerups.find(p=>p.id==='x2coins'); if(!x2.active) buyPowerup('x2coins'); }
                if(code === '9999') { coinCount += 50; updateCoinDisplay(); alert('+50 coins!'); saveToLocal(); }
                e.target.value = '';
            }
        });
        
        document.getElementById('tabPowerupsStore').addEventListener('click', () => { 
            document.getElementById('tabPowerupsStore').classList.add('active'); 
            document.getElementById('tabCosmeticsStore').classList.remove('active'); 
            document.getElementById('storePowerups').style.display = 'block'; 
            document.getElementById('storeCosmetics').style.display = 'none'; 
        });
        document.getElementById('tabCosmeticsStore').addEventListener('click', () => { 
            document.getElementById('tabCosmeticsStore').classList.add('active'); 
            document.getElementById('tabPowerupsStore').classList.remove('active'); 
            document.getElementById('storePowerups').style.display = 'none'; 
            document.getElementById('storeCosmetics').style.display = 'block'; 
        });
        
        window.addEventListener('click', (e) => { 
            if(e.target.classList.contains('store-modal')) document.getElementById('storeModal').classList.remove('active'); 
            if(e.target.classList.contains('locker-modal')) document.getElementById('lockerModal').classList.remove('active'); 
            if(e.target.classList.contains('achievements-modal')) document.getElementById('achievementsModal').classList.remove('active'); 
        });
        
        // Create gameScore element if missing
        if (!document.getElementById('gameScore')) {
            let scoreSpan = document.createElement('span');
            scoreSpan.id = 'gameScore';
            scoreSpan.style.display = 'none';
            document.body.appendChild(scoreSpan);
        }
        
        // Initialize
        loadFromLocal();
        drawGame();
        
        console.log('Game ready - Click START to play!');
    </script>
</body>
</html>
