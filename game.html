<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLAPPY CRIX • CRIXGAMING VR</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/newfavicon.png">
    
    <!-- Custom Pixel Font (OTF format) -->
    <style>
        @font-face {
            font-family: 'CRIX Pixel';
            src: url('https://raw.githubusercontent.com/CRIX447/crix-website/main/img/font.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
    </style>
    
    <style>
        /* CYBER STYLE WITH CURVED UI - OPTIMIZED FOR ALL DEVICES */
        :root {
            --neon-red: #FF4655;
            --neon-orange: #FF6B35;
            --cyber-red: #FF0040;
            --cyber-orange: #FF8C00;
            --matrix-green: #00FF9D;
            --dark-bg: #0A0A0F;
            --darker-bg: #050508;
            --grid-color: rgba(255, 70, 85, 0.1);
            --text-glow: 0 0 10px rgba(255, 107, 53, 0.7);
            
            /* Responsive sizing */
            --container-width: min(600px, 95vw);
            --canvas-size: min(400px, 85vw);
            --font-size-large: clamp(24px, 8vw, 48px);
            --font-size-medium: clamp(14px, 4vw, 20px);
            --font-size-small: clamp(10px, 3vw, 14px);
            --button-padding: clamp(8px, 2vw, 15px) clamp(15px, 4vw, 30px);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        
        body {
            font-family: 'CRIX Pixel', 'Courier New', monospace;
            background: var(--dark-bg);
            color: white;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 50px 50px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            overflow-x: hidden;
        }
        
        /* GAME CONTAINER - FULLY RESPONSIVE */
        .game-container {
            max-width: var(--container-width);
            width: 100%;
            background: rgba(5, 5, 8, 0.95);
            border: 3px solid var(--neon-red);
            border-radius: max(20px, 5vw);
            padding: max(15px, 3vw) max(10px, 2vw);
            position: relative;
            box-shadow: 0 10px 30px rgba(255, 70, 85, 0.4);
            margin: 10px auto;
        }
        
        .game-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, 
                transparent, 
                var(--neon-red), 
                var(--neon-orange), 
                var(--neon-red), 
                transparent);
            border-radius: max(20px, 5vw) max(20px, 5vw) 0 0;
        }
        
        /* HEADER */
        .game-header {
            text-align: center;
            margin-bottom: max(10px, 2vh);
            padding-bottom: max(8px, 1.5vh);
            border-bottom: 3px solid var(--neon-red);
        }
        
        .game-title {
            font-size: var(--font-size-large);
            font-weight: bold;
            background: linear-gradient(45deg, var(--neon-red), var(--neon-orange), #FF0040);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: max(2px, 1vw);
            margin-bottom: max(3px, 0.5vh);
            animation: hologram 3s infinite alternate;
            font-family: 'CRIX Pixel', 'Courier New', monospace;
            line-height: 1.2;
            word-break: break-word;
        }
        
        @keyframes hologram {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        
        .game-subtitle {
            font-size: var(--font-size-small);
            color: var(--matrix-green);
            text-transform: uppercase;
            letter-spacing: max(1px, 0.5vw);
            background: rgba(0, 0, 0, 0.5);
            padding: max(3px, 0.5vh) max(10px, 2vw);
            display: inline-block;
            border-radius: max(15px, 3vw);
            border: 2px solid var(--neon-orange);
            font-family: 'CRIX Pixel', 'Courier New', monospace;
            line-height: 1.4;
        }
        
        /* CANVAS WRAPPER - TOUCH OPTIMIZED */
        .canvas-wrapper {
            display: flex;
            justify-content: center;
            margin: max(8px, 1.5vh) 0;
            padding: max(8px, 1.5vh);
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid var(--neon-orange);
            border-radius: max(20px, 4vw);
            box-shadow: 0 5px 20px rgba(255, 107, 53, 0.3);
            cursor: pointer;
            touch-action: manipulation;
        }
        
        #gameCanvas {
            display: block;
            width: var(--canvas-size);
            height: auto;
            aspect-ratio: 2/3;
            border: 2px solid var(--neon-orange);
            border-radius: max(15px, 3vw);
            background: linear-gradient(180deg, #1a1a2e 0%, #0a0a1a 100%);
            touch-action: none;
            pointer-events: none;
        }
        
        /* STATS GRID - RESPONSIVE */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: max(5px, 1vw);
            margin: max(8px, 1.5vh) 0;
        }
        
        .cyber-stat {
            background: rgba(10, 10, 15, 0.8);
            border: 2px solid var(--neon-orange);
            border-radius: max(12px, 2vw);
            padding: max(5px, 1vh) max(2px, 0.5vw);
            text-align: center;
            transition: transform 0.2s;
            box-shadow: 0 5px 15px rgba(255, 107, 53, 0.3);
        }
        
        .cyber-stat:active {
            transform: scale(0.95);
        }
        
        .stat-label {
            font-size: var(--font-size-small);
            color: #ccc;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .stat-value {
            font-size: clamp(14px, 5vw, 20px);
            font-weight: bold;
            color: var(--neon-orange);
            font-family: 'CRIX Pixel', 'Courier New', monospace;
            white-space: nowrap;
        }
        
        #coinCount {
            color: gold;
            text-shadow: 0 0 10px gold;
        }
        
        /* INDICATORS - RESPONSIVE FLEX WRAP */
        .cheat-indicators, .active-powerups {
            display: flex;
            gap: max(5px, 1vw);
            justify-content: center;
            margin: max(5px, 1vh) 0;
            min-height: max(25px, 4vh);
            flex-wrap: wrap;
        }
        
        .cheat-badge, .powerup-badge {
            background: rgba(0, 0, 0, 0.7);
            border-radius: max(15px, 3vw);
            padding: max(3px, 0.5vh) max(8px, 1.5vw);
            font-size: var(--font-size-small);
            display: inline-flex;
            align-items: center;
            gap: max(3px, 0.5vw);
            animation: pulse 1.5s infinite;
            white-space: nowrap;
        }
        
        .cheat-badge.godmode {
            border: 2px solid var(--neon-red);
            color: var(--neon-red);
            background: rgba(255, 70, 85, 0.2);
        }
        
        .cheat-badge.coinlord {
            border: 2px solid gold;
            color: gold;
            background: rgba(255, 215, 0, 0.2);
        }
        
        .cheat-badge.slowmo {
            border: 2px solid var(--matrix-green);
            color: var(--matrix-green);
            background: rgba(0, 255, 157, 0.2);
        }
        
        .cheat-badge.bigbird {
            border: 2px solid var(--neon-orange);
            color: var(--neon-orange);
            background: rgba(255, 107, 53, 0.2);
        }
        
        .powerup-badge {
            border: 2px solid gold;
            color: gold;
        }
        
        .powerup-timer {
            background: var(--neon-red);
            color: white;
            border-radius: max(10px, 2vw);
            padding: max(1px, 0.2vh) max(4px, 0.8vw);
            font-size: calc(var(--font-size-small) - 2px);
        }
        
        @keyframes pulse {
            0% { opacity: 0.8; }
            50% { opacity: 1; }
            100% { opacity: 0.8; }
        }
        
        /* BUTTONS - TOUCH FRIENDLY */
        .store-button, .game-btn {
            background: linear-gradient(45deg, var(--neon-red), var(--neon-orange));
            color: white;
            border: 2px solid gold;
            border-radius: max(20px, 4vw);
            padding: var(--button-padding);
            font-size: var(--font-size-medium);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: max(1px, 0.3vw);
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'CRIX Pixel', 'Courier New', monospace;
            margin: max(5px, 1vh) auto;
            display: block;
            width: fit-content;
            min-width: max(150px, 40vw);
            max-width: 90%;
            box-shadow: 0 5px 15px gold;
            touch-action: manipulation;
            -webkit-appearance: none;
        }
        
        .store-button:active, .game-btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 10px gold;
        }
        
        .game-btn.secondary {
            background: linear-gradient(45deg, var(--matrix-green), #00F0FF);
            border-color: var(--neon-red);
            box-shadow: 0 5px 15px var(--matrix-green);
            min-width: max(120px, 30vw);
        }
        
        .controls-box {
            display: flex;
            gap: max(5px, 1vw);
            justify-content: center;
            margin: max(8px, 1.5vh) 0;
            flex-wrap: wrap;
        }
        
        /* CHEAT INPUT - OPTIMIZED */
        .cheat-container {
            margin: max(5px, 1vh) 0;
            text-align: center;
            opacity: 0.3;
            transition: opacity 0.3s;
        }
        
        .cheat-container:focus-within {
            opacity: 1;
        }
        
        .cheat-input {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid var(--neon-orange);
            border-radius: max(20px, 4vw);
            padding: max(5px, 1vh) max(10px, 2vw);
            font-family: 'CRIX Pixel', 'Courier New', monospace;
            color: var(--matrix-green);
            font-size: var(--font-size-medium);
            width: min(200px, 70vw);
            text-align: center;
            letter-spacing: 4px;
            -webkit-appearance: none;
            appearance: none;
        }
        
        /* INSTRUCTIONS */
        .instructions {
            text-align: center;
            margin: max(8px, 1.5vh) 0;
            padding: max(8px, 1.5vh);
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid var(--neon-orange);
            border-radius: max(20px, 4vw);
        }
        
        .instructions p {
            color: #ccc;
            font-size: var(--font-size-small);
            margin: 3px 0;
            line-height: 1.5;
        }
        
        .instructions .highlight {
            color: var(--neon-orange);
        }
        
        /* BACK LINK */
        .back-link {
            text-align: center;
            margin-top: max(8px, 1.5vh);
        }
        
        .back-link a {
            color: var(--matrix-green);
            text-decoration: none;
            font-size: var(--font-size-small);
            text-transform: uppercase;
            letter-spacing: max(1px, 0.3vw);
            padding: max(4px, 0.8vh) max(10px, 2vw);
            border: 2px solid var(--neon-red);
            border-radius: max(20px, 4vw);
            display: inline-block;
            transition: all 0.2s;
            touch-action: manipulation;
        }
        
        .back-link a:active {
            transform: scale(0.95);
            border-color: var(--matrix-green);
            color: var(--neon-orange);
        }
        
        /* MODALS - RESPONSIVE */
        .store-modal, .locker-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(5px);
            z-index: 10000;
            overflow-y: auto;
            padding: max(10px, 2vh);
            -webkit-overflow-scrolling: touch;
        }
        
        .store-modal.active, .locker-modal.active {
            display: block;
        }
        
        .store-modal-content, .locker-modal-content {
            max-width: min(700px, 95vw);
            margin: max(10px, 2vh) auto;
            background: var(--dark-bg);
            border: 3px solid var(--neon-red);
            border-radius: max(25px, 5vw);
            padding: max(15px, 3vh) max(10px, 2vw);
        }
        
        .locker-modal-content {
            border-color: var(--matrix-green);
        }
        
        .store-modal-header, .locker-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: max(10px, 2vh);
            border-bottom: 2px solid gold;
            padding-bottom: max(5px, 1vh);
        }
        
        .locker-modal-header {
            border-bottom-color: var(--matrix-green);
        }
        
        .store-modal-title, .locker-modal-title {
            font-size: clamp(20px, 6vw, 32px);
            color: gold;
            text-transform: uppercase;
            letter-spacing: max(1px, 0.3vw);
            font-family: 'CRIX Pixel', 'Courier New', monospace;
            word-break: break-word;
        }
        
        .locker-modal-title {
            color: var(--matrix-green);
        }
        
        .store-modal-close, .locker-modal-close {
            background: transparent;
            border: 2px solid var(--neon-red);
            color: var(--neon-red);
            font-size: clamp(20px, 6vw, 24px);
            width: max(30px, 8vw);
            height: max(30px, 8vw);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }
        
        .store-modal-close:active, .locker-modal-close:active {
            transform: scale(0.9);
            background: var(--neon-red);
            color: white;
        }
        
        /* TABS - RESPONSIVE */
        .store-tabs {
            display: flex;
            gap: max(5px, 1vw);
            margin-bottom: max(15px, 3vh);
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .store-tab {
            background: transparent;
            border: 2px solid var(--neon-orange);
            color: white;
            padding: max(5px, 1vh) max(15px, 3vw);
            border-radius: max(20px, 4vw);
            cursor: pointer;
            font-size: var(--font-size-medium);
            font-family: 'CRIX Pixel', 'Courier New', monospace;
            transition: all 0.2s;
            touch-action: manipulation;
            min-width: max(100px, 25vw);
        }
        
        .store-tab:active {
            transform: scale(0.95);
        }
        
        .store-tab.active {
            background: gold;
            border-color: gold;
            color: black;
        }
        
        /* GRIDS - RESPONSIVE */
        .store-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(200px, 90vw), 1fr));
            gap: max(10px, 2vw);
            margin: max(10px, 2vh) 0;
            max-height: 50vh;
            overflow-y: auto;
            padding: max(5px, 1vh);
            -webkit-overflow-scrolling: touch;
        }
        
        .store-item {
            background: rgba(20, 20, 30, 0.9);
            border: 2px solid var(--neon-orange);
            border-radius: max(15px, 3vw);
            padding: max(10px, 2vh);
            text-align: center;
            transition: all 0.2s;
        }
        
        .store-item:active {
            transform: scale(0.98);
        }
        
        .store-item img {
            width: min(60px, 15vw);
            height: min(60px, 15vw);
            object-fit: contain;
            margin-bottom: max(5px, 1vh);
        }
        
        .store-item-name {
            font-size: var(--font-size-small);
            color: white;
            margin-bottom: max(3px, 0.5vh);
            word-break: break-word;
        }
        
        .store-item-price {
            font-size: var(--font-size-medium);
            color: gold;
            font-weight: bold;
            margin: max(5px, 1vh) 0;
        }
        
        .store-item-desc {
            font-size: calc(var(--font-size-small) - 2px);
            color: #aaa;
            margin-bottom: max(5px, 1vh);
        }
        
        .store-buy-btn {
            background: linear-gradient(45deg, var(--neon-red), var(--neon-orange));
            color: white;
            border: none;
            border-radius: max(15px, 3vw);
            padding: max(5px, 1vh) max(10px, 2vw);
            font-size: var(--font-size-small);
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-family: 'CRIX Pixel', 'Courier New', monospace;
            transition: all 0.2s;
            touch-action: manipulation;
            min-height: max(30px, 5vh);
        }
        
        .store-buy-btn:active {
            transform: scale(0.95);
        }
        
        .store-buy-btn.owned {
            background: var(--matrix-green);
            color: black;
        }
        
        /* LOCKER - RESPONSIVE */
        .locker-preview {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: max(10px, 2vw);
            margin-bottom: max(15px, 3vh);
            padding: max(10px, 2vh);
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid var(--neon-orange);
            border-radius: max(20px, 4vw);
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .preview-canvas {
            width: min(120px, 30vw);
            height: min(120px, 30vw);
            background: linear-gradient(180deg, #1a1a2e 0%, #0a0a1a 100%);
            border: 2px solid gold;
            border-radius: max(10px, 2vw);
        }
        
        .preview-info {
            flex: 1;
            min-width: max(150px, 40vw);
            text-align: center;
        }
        
        .preview-title {
            font-size: var(--font-size-medium);
            color: gold;
            margin-bottom: max(5px, 1vh);
            word-break: break-word;
        }
        
        .preview-equip {
            display: flex;
            gap: max(5px, 1vw);
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .equip-btn {
            background: var(--matrix-green);
            color: black;
            border: none;
            border-radius: max(15px, 3vw);
            padding: max(5px, 1vh) max(10px, 2vw);
            font-size: var(--font-size-small);
            font-weight: bold;
            cursor: pointer;
            font-family: 'CRIX Pixel', 'Courier New', monospace;
            transition: all 0.2s;
            touch-action: manipulation;
            min-width: max(80px, 20vw);
        }
        
        .equip-btn:active {
            transform: scale(0.95);
        }
        
        .locker-section-title {
            font-size: var(--font-size-medium);
            color: var(--neon-orange);
            margin: max(10px, 2vh) 0 max(5px, 1vh);
            text-transform: uppercase;
        }
        
        .locker-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(100px, 40vw), 1fr));
            gap: max(5px, 1vw);
        }
        
        .locker-item {
            background: rgba(20, 20, 30, 0.9);
            border: 2px solid var(--neon-orange);
            border-radius: max(10px, 2vw);
            padding: max(5px, 1vh);
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
        }
        
        .locker-item:active {
            transform: scale(0.95);
        }
        
        .locker-item.equipped {
            border-color: var(--matrix-green);
            box-shadow: 0 0 20px var(--matrix-green);
        }
        
        .locker-item img {
            width: min(40px, 10vw);
            height: min(40px, 10vw);
            object-fit: contain;
            margin-bottom: max(3px, 0.5vh);
        }
        
        .locker-item-name {
            font-size: calc(var(--font-size-small) - 2px);
            color: white;
            word-break: break-word;
        }
        
        .locker-balance {
            text-align: center;
            font-size: var(--font-size-medium);
            color: gold;
            margin: max(10px, 2vh) 0;
            padding: max(8px, 1.5vh);
            border: 2px solid gold;
            border-radius: max(25px, 5vw);
        }
        
        /* BOUNCE ANIMATION */
        @keyframes bounce {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-5px); }
        }
        
        .bounce {
            animation: bounce 0.5s ease-in-out;
        }
        
        /* CONSOLE OPTIMIZATIONS */
        @media (hover: none) and (pointer: coarse) {
            /* Mobile/Touch optimizations */
            .store-button:hover, .game-btn:hover, .store-tab:hover {
                transform: none;
            }
            
            .store-button:active, .game-btn:active, .store-tab:active {
                transform: scale(0.95);
            }
            
            .cyber-stat {
                cursor: default;
            }
        }
        
        /* TV / Console optimizations */
        @media (min-width: 1200px) {
            :root {
                --container-width: 700px;
                --canvas-size: 450px;
            }
            
            .game-container {
                margin: 30px auto;
            }
            
            .store-button, .game-btn {
                transition: transform 0.3s;
            }
            
            .store-button:hover, .game-btn:hover {
                transform: scale(1.05);
            }
        }
        
        /* Landscape orientation on mobile */
        @media (orientation: landscape) and (max-height: 600px) {
            .game-container {
                padding: 10px;
            }
            
            .canvas-wrapper {
                margin: 5px 0;
                padding: 5px;
            }
            
            #gameCanvas {
                max-height: 50vh;
                width: auto;
            }
            
            .stats-grid {
                margin: 5px 0;
            }
            
            .cheat-indicators, .active-powerups {
                margin: 3px 0;
            }
        }
    </style>
</head>
<body>
    <!-- AUDIO PLAYERS -->
    <audio id="jumpSound" preload="auto">
        <source src="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/jump.mp3" type="audio/mpeg">
    </audio>
    
    <audio id="deathSound" preload="auto">

        // ========== LOAD SAVED DATA ==========
        function loadSavedData() {
            // Load owned cosmetics
            const savedOwned = localStorage.getItem('flappyCrixOwned');

                const ownedIds = JSON.parse(savedOwned);
                cosmetics.forEach(item => {
                    item.owned = ownedIds.includes(item.id);
                });

            // Load equipped items
            const savedEquipped = localStorage.getItem('flappyCrixEquipped');
            if (savedEquipped) {
                const equipped = JSON.parse(savedEquipped);
                cosmetics.forEach(item => {
                    if (equipped[item.type] === item.id) {
                        item.equipped = true;
                    }
                });
            }
            
            // Load active power-ups
            const savedPowerups = localStorage.getItem('flappyCrixPowerups');
            if (savedPowerups) {
                const active = JSON.parse(savedPowerups);
                powerups.forEach(p => {
                    if (active[p.id]) {
                        p.active = true;
                        p.timeLeft = active[p.id].timeLeft || p.duration;
                        startPowerupTimer(p);
                    }
                });
            }
            
            updateMultiplier();
        }
        
        // ========== POWER-UP TIMERS ==========
        function startPowerupTimer(powerup) {
            if (powerup.timerInterval) clearInterval(powerup.timerInterval);
            
            powerup.timerInterval = setInterval(() => {
                powerup.timeLeft--;
                
                if (powerup.timeLeft <= 0) {
                    powerup.active = false;
                    powerup.timeLeft = 0;
                    clearInterval(powerup.timerInterval);
                    
                    savePowerups();
                    
                    if (powerup.id === 'x2coins') {
                        updateMultiplier();
                    }
                }
                
                updateActivePowerupsDisplay();
            }, 1000);
        }
        
        function activatePowerup(powerupId) {
            const powerup = powerups.find(p => p.id === powerupId);
            if (!powerup) return;
            
            powerup.active = true;
            powerup.timeLeft = powerup.duration;
            playPowerupSound();
            startPowerupTimer(powerup);
            
            if (powerupId === 'x2coins') {
                updateMultiplier();
            }
            
            savePowerups();
            updateActivePowerupsDisplay();
        }
        
        function updateMultiplier() {
            const x2Active = powerups.find(p => p.id === 'x2coins')?.active || false;
            coinMultiplier = x2Active ? 2 : 1;
            coinMultiplierEl.textContent = coinMultiplier + 'x';
        }

        function updatePreview() {
            previewCtx.clearRect(0, 0, 150, 150);
            
            // Draw background
            previewCtx.fillStyle = '#0A0A0F';
            previewCtx.fillRect(0, 0, 150, 150);
            
            // Draw grid
            previewCtx.strokeStyle = 'rgba(255, 70, 85, 0.1)';
            previewCtx.lineWidth = 1;
            for (let i = 0; i < 150; i += 20) {
                previewCtx.beginPath();
                previewCtx.moveTo(i, 0);
                previewCtx.lineTo(i, 150);
                previewCtx.stroke();
                previewCtx.beginPath();
                previewCtx.moveTo(0, i);
                previewCtx.lineTo(150, i);
                previewCtx.stroke();
            }
            
            // Draw bird with cheat size
            previewCtx.save();
            previewCtx.translate(75, 75);
            
            let size = cheats.bigbird ? 50 : 40;
            
            if (birdImage.complete) {
                previewCtx.drawImage(birdImage, -size/2, -size/2, size, size);
                
                // Draw shirt
                const shirt = cosmetics.find(c => c.type === 'shirt' && c.equipped);
                if (shirt) {
                    const shirtImg = new Image();
                    shirtImg.src = shirt.image;
                    previewCtx.drawImage(shirtImg, -size/2, -size/2, size, size);
                }
                
                // Draw hat
                const hat = cosmetics.find(c => c.type === 'hat' && c.equipped);
                if (hat) {
                    const hatImg = new Image();
                    hatImg.src = hat.image;
                    previewCtx.drawImage(hatImg, -size/2, -size/2 - 5, size, size);
                }
            }
            
            previewCtx.restore();
            
            const hat = cosmetics.find(c => c.type === 'hat' && c.equipped);
            const shirt = cosmetics.find(c => c.type === 'shirt' && c.equipped);
            previewTitle.textContent = hat || shirt ? 'CURRENT DRIP' : 'NO DRIP EQUIPPED';
        }
        
        // ========== GAME CLASS ==========
        class FlappyBird {
            constructor() {
                this.reset();
            }
            
            reset() {
                let size = cheats.bigbird ? 45 : 30;
                
                this.bird = {
                    x: 100,
                    y: 300,
                    width: size,
                    height: size,
                    velocity: 0,
                    gravity: cheats.slowmo ? 0.15 : 0.25,
                    jump: cheats.slowmo ? -5 : -6.5
                };
                
                this.pipes = [];
                this.pipeWidth = 50;
                this.pipeGap = 170;
                this.frameCount = 0;
                this.score = 0;
                this.gameOver = false;
                
                coins = [];
            }
            
            isCoinPositionSafe(x, y) {
                if (y < 40 || y > canvas.height - 40) return false;
                
                for (let pipe of this.pipes) {
                    if (Math.abs(x - pipe.x) < 60) {
                        if (y < pipe.top - 30 || y > pipe.bottom + 30) {
                            return false;
                        }
                    }
                }
                
                return true;
            }
            
            getSafeCoinY(x) {
                for (let attempt = 0; attempt < 50; attempt++) {
                    const y = Math.random() * (canvas.height - 80) + 40;
                    if (this.isCoinPositionSafe(x, y)) {
                        return y;
                    }
                }
                return canvas.height / 2;
            }
            
            draw() {
                // Clear canvas
                ctx.fillStyle = '#0A0A0F';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Draw grid
                ctx.strokeStyle = 'rgba(255, 70, 85, 0.1)';
                ctx.lineWidth = 1;
                for (let i = 0; i < canvas.width; i += 50) {
                    ctx.beginPath();
                    ctx.moveTo(i, 0);
                    ctx.lineTo(i, canvas.height);
                    ctx.stroke();
                }
                for (let i = 0; i < canvas.height; i += 50) {
                    ctx.beginPath();
                    ctx.moveTo(0, i);
                    ctx.lineTo(canvas.width, i);
                    ctx.stroke();
                }
                
                // Draw pipes
                ctx.fillStyle = '#00FF9D';
                ctx.shadowColor = '#00FF9D';
                ctx.shadowBlur = 10;
                this.pipes.forEach(pipe => {
                    ctx.fillRect(pipe.x, 0, this.pipeWidth, pipe.top);
                    ctx.fillRect(pipe.x, pipe.bottom, this.pipeWidth, canvas.height - pipe.bottom);
                });
                ctx.shadowBlur = 0;
                
                // Draw coins
                coins.forEach(coin => {
                    if (!coin.collected) {
                        if (coinImage.complete) {
                            ctx.drawImage(coinImage, coin.x - 15, coin.y - 15, 30, 30);
                        }
                    }
                });
                
                // Draw bird with cosmetics
                ctx.save();
                ctx.translate(this.bird.x, this.bird.y);
                
                // Rotate based on velocity
                let rotation = Math.min(Math.max(this.bird.velocity * 0.1, -0.5), 0.5);
                ctx.rotate(rotation);
                
                if (birdImage.complete) {
                    let size = cheats.bigbird ? 45 : 30;
                    ctx.drawImage(birdImage, -size/2, -size/2, size, size);
                    
                    // Draw shirt
                    const shirt = cosmetics.find(c => c.type === 'shirt' && c.equipped);
                    if (shirt) {
                        const shirtImg = new Image();
                        shirtImg.src = shirt.image;
                        ctx.drawImage(shirtImg, -size/2, -size/2, size, size);
                    }
                    
                    // Draw hat
                    const hat = cosmetics.find(c => c.type === 'hat' && c.equipped);
                    if (hat) {
                        const hatImg = new Image();
                        hatImg.src = hat.image;
                        ctx.drawImage(hatImg, -size/2, -size/2 - 5, size, size);
                    }
                }
                
                ctx.restore();
                
                // Draw score
                if (!this.gameOver && gameRunning) {
                    ctx.fillStyle = '#FF6B35';
                    ctx.font = '20px "CRIX Pixel", monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText(`SCORE: ${this.score}`, canvas.width / 2, 50);
                }
                
                if (this.gameOver) {
                    ctx.fillStyle = '#FF4655';
                    ctx.font = '28px "CRIX Pixel", monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2);
                    ctx.font = '16px "CRIX Pixel", monospace';
                    ctx.fillText('Press START', canvas.width / 2, canvas.height / 2 + 40);
                }
            }
            
            update() {
                if (this.gameOver) return;
                
                const shieldActive = powerups.find(p => p.id === 'shield')?.active || cheats.godmode;
                const magnetActive = powerups.find(p => p.id === 'magnet')?.active || false;
                
                // Bird physics
                this.bird.velocity += this.bird.gravity;
                this.bird.y += this.bird.velocity;
                
                // Check boundaries
                if (!shieldActive) {
                    if (this.bird.y < 10 || this.bird.y > canvas.height - 10) {
                        this.gameOver = true;
                        playDeathSound();
                        this.updateHighScore();
                    }
                } else {
                    if (this.bird.y < 10) {
                        this.bird.y = 10;
                        this.bird.velocity = Math.abs(this.bird.velocity) * 0.5;
                    }
                    if (this.bird.y > canvas.height - 10) {
                        this.bird.y = canvas.height - 10;
                        this.bird.velocity = -Math.abs(this.bird.velocity) * 0.5;
                    }
                }
                
                // Generate pipes (slower if slowmo)
                let pipeRate = cheats.slowmo ? 180 : 120;
                if (this.frameCount % pipeRate === 0) {
                    const topHeight = Math.random() * (canvas.height - this.pipeGap - 150) + 70;
                    this.pipes.push({
                        x: canvas.width,
                        top: topHeight,
                        bottom: topHeight + this.pipeGap,
                        scored: false
                    });
                }
                
                // Generate coins (more if coinlord)
                let coinRate = cheats.coinlord ? 20 : 40;
                let coinChance = cheats.coinlord ? 0.8 : 0.4;
                
                if (this.frameCount % coinRate === 0 && gameRunning) {
                    if (Math.random() < coinChance) {
                        const coinX = canvas.width + 40;
                        const coinY = this.getSafeCoinY(coinX);
                        coins.push({
                            x: coinX,
                            y: coinY,
                            collected: false
                        });
                    }
                }
                
                // Update pipes
                let speed = cheats.slowmo ? 1.5 : 2.5;
                for (let i = this.pipes.length - 1; i >= 0; i--) {
                    this.pipes[i].x -= speed;
                    
                    if (!shieldActive) {
                        if (this.bird.x + 15 > this.pipes[i].x && 
                            this.bird.x - 15 < this.pipes[i].x + this.pipeWidth) {
                            if (this.bird.y - 15 < this.pipes[i].top || 
                                this.bird.y + 15 > this.pipes[i].bottom) {
                                this.gameOver = true;
                                playDeathSound();
                                this.updateHighScore();
                            }
                        }
                    }
                    
                    if (this.pipes[i].x + this.pipeWidth < this.bird.x && !this.pipes[i].scored) {
                        this.score++;
                        this.pipes[i].scored = true;
                        gameScore.textContent = this.score;
                    }
                    
                    if (this.pipes[i].x + this.pipeWidth < 0) {
                        this.pipes.splice(i, 1);
                    }
                }
                
                // Update coins
                for (let i = coins.length - 1; i >= 0; i--) {
                    if (!coins[i].collected) {
                        coins[i].x -= speed;
                        
                        let dist;
                        if (magnetActive) {
                            const dx = this.bird.x - coins[i].x;
                            const dy = this.bird.y - coins[i].y;
                            dist = Math.hypot(dx, dy);
                            if (dist < 80) {
                                coins[i].x += dx * 0.05;
                                coins[i].y += dy * 0.05;
                            }
                        }
                        
                        dist = Math.hypot(this.bird.x - coins[i].x, this.bird.y - coins[i].y);
                        if (dist < 30) {
                            coins[i].collected = true;
                            coinCount += coinMultiplier;
                            playCoinSound();
                            updateCoinDisplay();
                            localStorage.setItem('flappyCrixCoins', coinCount);
                        }
                        
                        if (coins[i].x + 30 < 0) {
                            coins.splice(i, 1);
                        }
                    } else {
                        coins.splice(i, 1);
                    }
                }
                
                this.frameCount++;
            }
            
            updateHighScore() {
                if (this.score > highScore) {
                    highScore = this.score;
                    localStorage.setItem('flappyCrixHighScore', highScore);
                    highScoreEl.textContent = highScore;
                }
            }
            
            jump() {
                if (this.gameOver || !gameRunning) return;
                this.bird.velocity = this.bird.jump;
                playJumpSound();
            }
        }
        
        let game = new FlappyBird();
        
        // ========== SOUND FUNCTIONS ==========
        function playJumpSound() {
            jumpSound.currentTime = 0;
            jumpSound.volume = 0.3;
            jumpSound.play().catch(e => console.log('Jump sound blocked'));
        }
        
        function playDeathSound() {
            deathSound.currentTime = 0;
            deathSound.volume = 0.4;
            deathSound.play().catch(e => console.log('Death sound blocked'));
            
            if (!musicMuted) {
                bgMusic.pause();
                musicWasPlaying = true;
                musicToggle.innerHTML = '🔇 MUSIC';
                musicMuted = true;
            }
        }
        
        function playSelectSound() {
            purchaseSound.currentTime = 0;
            purchaseSound.volume = 0.3;
            purchaseSound.play().catch(e => console.log('Select sound blocked'));
        }
        
        function playCoinSound() {
            coinSound.currentTime = 0;
            coinSound.volume = 0.3;
            coinSound.play().catch(e => console.log('Coin sound blocked'));
        }
        
        function playPurchaseSound() {
            purchaseSound.currentTime = 0;
            purchaseSound.volume = 0.3;
            purchaseSound.play().catch(e => console.log('Purchase sound blocked'));
        }
        
        function playPowerupSound() {
            powerupSound.currentTime = 0;
            powerupSound.volume = 0.3;
            powerupSound.play().catch(e => console.log('Powerup sound blocked'));
        }
        
        function updateCoinDisplay() {
            coinCountEl.innerHTML = `🪙 ${coinCount}`;
            if (lockerBalance) lockerBalance.innerHTML = `🪙 ${coinCount}`;
        }
        
        // ========== MUSIC CONTROL ==========
        bgMusic.volume = 0.3;
        musicMuted = true;
        musicToggle.innerHTML = '🔇 MUSIC';
        
        musicToggle.addEventListener('click', () => {
            if (musicMuted) {
                bgMusic.play();
                musicToggle.innerHTML = '🔊 MUSIC';
            } else {
                bgMusic.pause();
                musicToggle.innerHTML = '🔇 MUSIC';
            }
            musicMuted = !musicMuted;
            playSelectSound();
        });
        
        // ========== CHEAT CODES ==========
        const CHEATS = {
            '6969': () => { // GODMODE
                cheats.godmode = !cheats.godmode;
                updateCheatIndicators();
                alert(cheats.godmode ? '👼 Godmode activated!' : '👼 Godmode deactivated');
            },
            '1337': () => { // COIN LORD
                cheats.coinlord = !cheats.coinlord;
                updateCheatIndicators();
                alert(cheats.coinlord ? '💰 Coin Lord activated!' : '💰 Coin Lord deactivated');
                if (gameRunning) game.reset();
            },
            '0420': () => { // SLOW MO
                cheats.slowmo = !cheats.slowmo;
                updateCheatIndicators();
                alert(cheats.slowmo ? '⏱️ Slow motion activated!' : '⏱️ Slow motion deactivated');
                if (gameRunning) game.reset();
            },
            '8008': () => { // BIG BIRD
                cheats.bigbird = !cheats.bigbird;
                updateCheatIndicators();
                alert(cheats.bigbird ? '🦅 Big bird activated!' : '🦅 Big bird deactivated');
                if (gameRunning) game.reset();
                updatePreview();
            },
            '2468': () => { // 2X COINS (power-up)
                const x2 = powerups.find(p => p.id === 'x2coins');
                if (!x2.active) {
                    activatePowerup('x2coins');
                }
            },
            '9999': () => { // +50 COINS
                coinCount += 50;
                updateCoinDisplay();
                localStorage.setItem('flappyCrixCoins', coinCount);
                alert('💰 +50 coins!');
            }
        };
        
        cheatInput.addEventListener('input', (e) => {
            const code = e.target.value;
            if (code.length === 4 && CHEATS[code]) {
                CHEATS[code]();
                cheatInput.value = '';
            }
        });
        
        // ========== EXIT WITH BOUNCE ==========
        backLink.addEventListener('click', (e) => {
            if (cheats.godmode) {
                e.preventDefault();
                document.querySelector('.game-container').classList.add('bounce');
                alert('HEY! I KNOW YOU GOT GODMODE BUT IT DOESNT MEAN YOU GOTTA BREAK THE FORTH WALL MAN!');
                setTimeout(() => {
                    document.querySelector('.game-container').classList.remove('bounce');
                }, 500);
                setTimeout(() => {
                    window.open('https://crixgamingvr.vercel.app', '_blank');
                }, 600);
            }
        });
        
        // ========== GAME LOOP ==========
        function gameLoop() {
            if (gameRunning) {
                game.update();
                game.draw();
                gameAnimationFrame = requestAnimationFrame(gameLoop);
            }
        }
        
        function startGame() {
            playSelectSound();
            game.reset();
            gameRunning = true;
            gameScore.textContent = '0';
            
            if (musicWasPlaying && musicMuted) {
                bgMusic.play();
                musicToggle.innerHTML = '🔊 MUSIC';
                musicMuted = false;
                musicWasPlaying = false;
            }
            
            if (gameAnimationFrame) cancelAnimationFrame(gameAnimationFrame);
            gameLoop();
        }
        
        // ========== INPUT HANDLERS (PC, MOBILE, CONSOLE) ==========
        
        // Touch/Click on canvas
        canvasWrapper.addEventListener('click', () => game.jump());
        canvasWrapper.addEventListener('touchstart', (e) => {
            e.preventDefault();
            game.jump();
        });
        
        // Keyboard (PC)
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                game.jump();
            }
            
            // Console controller emulation
            if (e.code === 'GamepadButton0' || e.code === 'GamepadButton1' || 
                e.code === 'GamepadButton2' || e.code === 'GamepadButton3' ||
                e.code === 'GamepadButton9') { // A, B, X, Y, Start buttons
                e.preventDefault();
                game.jump();
            }
        });
        
        // Gamepad/Controller support
        let gamepadIndex = null;
        
        window.addEventListener('gamepadconnected', (e) => {
            gamepadIndex = e.gamepad.index;
            console.log('Controller connected');
        });
        
        window.addEventListener('gamepaddisconnected', () => {
            gamepadIndex = null;
            console.log('Controller disconnected');
        });
        
        function checkGamepad() {
            if (gamepadIndex !== null) {
                const gamepad = navigator.getGamepads()[gamepadIndex];
                if (gamepad) {
                    // Check for button presses (A, B, X, Y, Start)
                    const jumpButtons = [0, 1, 2, 3, 9]; // A, B, X, Y, Start
                    for (let button of jumpButtons) {
                        if (gamepad.buttons[button] && gamepad.buttons[button].pressed) {
                            game.jump();
                            break;
                        }
                    }
                }
            }
            requestAnimationFrame(checkGamepad);
        }
        
        // Start checking for gamepad
        checkGamepad();
        
        // ========== EVENT LISTENERS ==========
        startGameBtn.addEventListener('click', startGame);
        
        storeBtn.addEventListener('click', openStore);
        closeStoreBtn.addEventListener('click', closeStore);
        
        lockerBtn.addEventListener('click', openLocker);
        closeLockerBtn.addEventListener('click', closeLocker);
        
        tabPowerupsStore.addEventListener('click', () => {
            tabPowerupsStore.classList.add('active');
            tabCosmeticsStore.classList.remove('active');
            storePowerups.style.display = 'block';
            storeCosmetics.style.display = 'none';
        });
        
        tabCosmeticsStore.addEventListener('click', () => {
            tabCosmeticsStore.classList.add('active');
            tabPowerupsStore.classList.remove('active');
            storePowerups.style.display = 'none';
            storeCosmetics.style.display = 'block';
        });
        
        window.addEventListener('click', (e) => {
            if (e.target === storeModal) closeStore();
            if (e.target === lockerModal) closeLocker();
        });
        
        // Prevent zoom on double tap for mobile
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });
        
        // ========== INITIALIZE ==========
        highScoreEl.textContent = highScore;
        loadSavedData();
        updateCoinDisplay();
        updateActivePowerupsDisplay();
        updateCheatIndicators();
        game.draw();
        
        // Load images for preview
        birdImage.onload = () => {
            updatePreview();
            game.draw();
        };
    </script>
</body>
