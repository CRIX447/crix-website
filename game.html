<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLAPPY CRIX • CRIXGAMING VR</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/newfavicon.png">
    
    <!-- Custom Pixel Font (OTF format) -->
    <style>
        @font-face {
            font-family: 'CRIX Pixel';
            src: url('https://raw.githubusercontent.com/CRIX447/crix-website/main/img/font.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
    </style>
    
    <style>
        /* CLEAN CYBER STYLE - EVERYTHING NEAT AND ORGANIZED */
        :root {
            --neon-red: #FF4655;
            --neon-orange: #FF6B35;
            --cyber-red: #FF0040;
            --cyber-orange: #FF8C00;
            --matrix-green: #00FF9D;
            --dark-bg: #0A0A0F;
            --darker-bg: #050508;
            --grid-color: rgba(255, 70, 85, 0.1);
            --text-glow: 0 0 10px rgba(255, 107, 53, 0.7);
            
            /* Consistent sizing */
            --container-width: min(600px, 95vw);
            --canvas-size: min(400px, 85vw);
            --font-large: clamp(24px, 8vw, 48px);
            --font-medium: clamp(14px, 4vw, 20px);
            --font-small: clamp(10px, 3vw, 14px);
            --spacing: clamp(8px, 2vh, 15px);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'CRIX Pixel', 'Courier New', monospace;
            background: var(--dark-bg);
            color: white;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 50px 50px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing);
        }
        
        /* MAIN GAME CONTAINER - CLEAN AND ORGANIZED */
        .game-container {
            max-width: var(--container-width);
            width: 100%;
            background: rgba(5, 5, 8, 0.95);
            border: 3px solid var(--neon-red);
            border-radius: 20px;
            padding: var(--spacing);
            position: relative;
            box-shadow: 0 10px 30px rgba(255, 70, 85, 0.4);
        }
        
        .game-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, 
                transparent, 
                var(--neon-red), 
                var(--neon-orange), 
                var(--neon-red), 
                transparent);
            border-radius: 20px 20px 0 0;
        }
        
        /* HEADER - TOP */
        .game-header {
            text-align: center;
            margin-bottom: var(--spacing);
            padding-bottom: var(--spacing);
            border-bottom: 3px solid var(--neon-red);
        }
        
        .game-title {
            font-size: var(--font-large);
            font-weight: bold;
            background: linear-gradient(45deg, var(--neon-red), var(--neon-orange), #FF0040);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            animation: hologram 3s infinite alternate;
            font-family: 'CRIX Pixel', 'Courier New', monospace;
        }
        
        .game-subtitle {
            font-size: var(--font-small);
            color: var(--matrix-green);
            text-transform: uppercase;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 15px;
            display: inline-block;
            border-radius: 30px;
            border: 2px solid var(--neon-orange);
        }
        
        /* CANVAS - CENTERED */
        .canvas-wrapper {
            display: flex;
            justify-content: center;
            margin: var(--spacing) 0;
            padding: var(--spacing);
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid var(--neon-orange);
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(255, 107, 53, 0.3);
        }
        
        #gameCanvas {
            display: block;
            width: var(--canvas-size);
            height: auto;
            aspect-ratio: 2/3;
            border: 2px solid var(--neon-orange);
            border-radius: 10px;
            background: linear-gradient(180deg, #1a1a2e 0%, #0a0a1a 100%);
        }
        
        /* STATS GRID - 4 COLUMNS */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: var(--spacing) 0;
        }
        
        .cyber-stat {
            background: rgba(10, 10, 15, 0.8);
            border: 2px solid var(--neon-orange);
            border-radius: 10px;
            padding: 8px 5px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(255, 107, 53, 0.3);
        }
        
        .stat-label {
            font-size: var(--font-small);
            color: #ccc;
            text-transform: uppercase;
            margin-bottom: 3px;
        }
        
        .stat-value {
            font-size: clamp(14px, 5vw, 20px);
            font-weight: bold;
            color: var(--neon-orange);
            font-family: 'CRIX Pixel', 'Courier New', monospace;
        }
        
        #coinCount {
            color: gold;
            text-shadow: 0 0 10px gold;
        }
        
        /* INDICATORS ROW - CHEATS AND POWER-UPS */
        .indicators-row {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin: var(--spacing) 0;
            min-height: 50px;
        }
        
        .cheat-indicators, .active-powerups {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .cheat-badge, .powerup-badge {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: var(--font-small);
            display: inline-flex;
            align-items: center;
            gap: 5px;
            animation: pulse 1.5s infinite;
        }
        
        .cheat-badge.godmode {
            border: 2px solid var(--neon-red);
            color: var(--neon-red);
        }
        
        .cheat-badge.coinlord {
            border: 2px solid gold;
            color: gold;
        }
        
        .cheat-badge.slowmo {
            border: 2px solid var(--matrix-green);
            color: var(--matrix-green);
        }
        
        .cheat-badge.bigbird {
            border: 2px solid var(--neon-orange);
            color: var(--neon-orange);
        }
        
        .powerup-badge {
            border: 2px solid gold;
            color: gold;
        }
        
        .powerup-timer {
            background: var(--neon-red);
            color: white;
            border-radius: 15px;
            padding: 2px 6px;
            font-size: calc(var(--font-small) - 2px);
        }
        
        /* BUTTONS ROW */
        .buttons-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: var(--spacing) 0;
            flex-wrap: wrap;
        }
        
        .action-btn {
            background: linear-gradient(45deg, var(--neon-red), var(--neon-orange));
            color: white;
            border: 2px solid gold;
            border-radius: 30px;
            padding: 10px 25px;
            font-size: var(--font-medium);
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'CRIX Pixel', 'Courier New', monospace;
            min-width: 120px;
            box-shadow: 0 5px 15px gold;
        }
        
        .action-btn.small {
            padding: 8px 20px;
            font-size: var(--font-small);
            min-width: 100px;
        }
        
        .action-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px gold;
        }
        
        .action-btn.secondary {
            background: linear-gradient(45deg, var(--matrix-green), #00F0FF);
            border-color: var(--neon-red);
            box-shadow: 0 5px 15px var(--matrix-green);
        }
        
        /* GAME CONTROLS ROW */
        .game-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: var(--spacing) 0;
            flex-wrap: wrap;
        }
        
        .game-btn {
            background: linear-gradient(45deg, var(--neon-red), var(--neon-orange));
            color: white;
            border: 2px solid var(--matrix-green);
            border-radius: 30px;
            padding: 10px 25px;
            font-size: var(--font-medium);
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'CRIX Pixel', 'Courier New', monospace;
            min-width: 120px;
            box-shadow: 0 5px 15px rgba(0, 255, 157, 0.3);
        }
        
        .game-btn.secondary {
            background: linear-gradient(45deg, var(--matrix-green), #00F0FF);
        }
        
        .game-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px var(--matrix-green);
        }
        
        /* CHEAT INPUT - DISCREET */
        .cheat-container {
            margin: var(--spacing) 0;
            text-align: center;
            opacity: 0.2;
            transition: opacity 0.3s;
        }
        
        .cheat-container:hover,
        .cheat-container:focus-within {
            opacity: 1;
        }
        
        .cheat-input {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid var(--neon-orange);
            border-radius: 30px;
            padding: 8px 15px;
            font-family: 'CRIX Pixel', 'Courier New', monospace;
            color: var(--matrix-green);
            font-size: var(--font-small);
            width: 150px;
            text-align: center;
            letter-spacing: 4px;
        }
        
        /* INSTRUCTIONS */
        .instructions {
            text-align: center;
            margin: var(--spacing) 0;
            padding: var(--spacing);
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid var(--neon-orange);
            border-radius: 15px;
        }
        
        .instructions p {
            color: #ccc;
            font-size: var(--font-small);
            margin: 3px 0;
        }
        
        .instructions .highlight {
            color: var(--neon-orange);
        }
        
        /* BACK LINK */
        .back-link {
            text-align: center;
            margin-top: var(--spacing);
        }
        
        .back-link a {
            color: var(--matrix-green);
            text-decoration: none;
            font-size: var(--font-small);
            text-transform: uppercase;
            padding: 6px 20px;
            border: 2px solid var(--neon-red);
            border-radius: 30px;
            display: inline-block;
            transition: all 0.2s;
        }
        
        .back-link a:hover {
            border-color: var(--matrix-green);
            color: var(--neon-orange);
        }
        
        /* MODALS - STORE AND LOCKER */
        .store-modal, .locker-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(5px);
            z-index: 10000;
            overflow-y: auto;
            padding: 20px;
        }
        
        .store-modal.active, .locker-modal.active {
            display: block;
        }
        
        .store-modal-content, .locker-modal-content {
            max-width: 700px;
            margin: 30px auto;
            background: var(--dark-bg);
            border: 3px solid var(--neon-red);
            border-radius: 20px;
            padding: 20px;
        }
        
        .locker-modal-content {
            border-color: var(--matrix-green);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid gold;
            padding-bottom: 10px;
        }
        
        .modal-title {
            font-size: clamp(20px, 6vw, 28px);
            color: gold;
            text-transform: uppercase;
            font-family: 'CRIX Pixel', 'Courier New', monospace;
        }
        
        .modal-close {
            background: transparent;
            border: 2px solid var(--neon-red);
            color: var(--neon-red);
            font-size: 24px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-close:hover {
            background: var(--neon-red);
            color: white;
        }
        
        .store-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }
        
        .store-tab {
            background: transparent;
            border: 2px solid var(--neon-orange);
            color: white;
            padding: 8px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-size: var(--font-medium);
            font-family: 'CRIX Pixel', 'Courier New', monospace;
        }
        
        .store-tab.active {
            background: gold;
            border-color: gold;
            color: black;
        }
        
        .store-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
        }
        
        .store-item {
            background: rgba(20, 20, 30, 0.9);
            border: 2px solid var(--neon-orange);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
        }
        
        .store-item img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            margin-bottom: 8px;
        }
        
        .store-item-name {
            font-size: var(--font-small);
            color: white;
            margin-bottom: 5px;
        }
        
        .store-item-price {
            font-size: var(--font-medium);
            color: gold;
            font-weight: bold;
            margin: 8px 0;
        }
        
        .store-item-desc {
            font-size: calc(var(--font-small) - 2px);
            color: #aaa;
            margin-bottom: 10px;
        }
        
        .store-buy-btn {
            background: linear-gradient(45deg, var(--neon-red), var(--neon-orange));
            color: white;
            border: none;
            border-radius: 25px;
            padding: 8px 15px;
            font-size: var(--font-small);
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-family: 'CRIX Pixel', 'Courier New', monospace;
        }
        
        .store-buy-btn.owned {
            background: var(--matrix-green);
            color: black;
        }
        
        .store-buy-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* LOCKER SPECIFIC STYLES */
        .locker-preview {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid gold;
            border-radius: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .preview-canvas {
            width: 120px;
            height: 120px;
            background: linear-gradient(180deg, #1a1a2e 0%, #0a0a1a 100%);
            border: 2px solid gold;
            border-radius: 10px;
        }
        
        .preview-info {
            flex: 1;
            min-width: 200px;
            text-align: center;
        }
        
        .preview-title {
            font-size: var(--font-medium);
            color: gold;
            margin-bottom: 10px;
        }
        
        .preview-equip {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .equip-btn {
            background: var(--matrix-green);
            color: black;
            border: none;
            border-radius: 25px;
            padding: 8px 15px;
            font-size: var(--font-small);
            font-weight: bold;
            cursor: pointer;
            font-family: 'CRIX Pixel', 'Courier New', monospace;
        }
        
        .locker-section {
            margin-bottom: 20px;
        }
        
        .locker-section-title {
            font-size: var(--font-medium);
            color: var(--neon-orange);
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        .locker-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
        }
        
        .locker-item {
            background: rgba(20, 20, 30, 0.9);
            border: 2px solid var(--neon-orange);
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            position: relative;
        }
        
        .locker-item:hover {
            border-color: gold;
        }
        
        .locker-item.equipped {
            border-color: var(--matrix-green);
            box-shadow: 0 0 15px var(--matrix-green);
        }
        
        .locker-item img {
            width: 50px;
            height: 50px;
            object-fit: contain;
            margin-bottom: 5px;
        }
        
        .locker-item-name {
            font-size: calc(var(--font-small) - 2px);
            color: white;
        }
        
        .equipped-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--matrix-green);
            color: black;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }
        
        .locker-balance {
            text-align: center;
            font-size: var(--font-medium);
            color: gold;
            margin: 15px 0;
            padding: 10px;
            border: 2px solid gold;
            border-radius: 30px;
        }
        
        /* VICTORY OVERLAY */
        .victory-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 20000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            padding: 20px;
        }
        
        .victory-overlay.active {
            display: flex;
        }
        
        .victory-title {
            font-size: clamp(30px, 10vw, 48px);
            color: gold;
            text-shadow: 0 0 20px gold;
            margin-bottom: 20px;
            animation: victoryPulse 2s infinite;
        }
        
        .victory-message {
            font-size: var(--font-medium);
            color: white;
            margin: 20px 0;
            max-width: 500px;
        }
        
        .victory-message.cheater {
            color: var(--neon-red);
        }
        
        .victory-restart {
            background: linear-gradient(45deg, var(--neon-red), var(--neon-orange));
            color: white;
            border: 2px solid gold;
            border-radius: 30px;
            padding: 15px 40px;
            font-size: var(--font-large);
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
        }
        
        /* EVENT OVERLAYS */
        .event-overlay, .boom-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 15000;
            pointer-events: none;
            text-align: center;
        }
        
        .event-gif {
            max-width: 200px;
            max-height: 200px;
            animation: float 1s infinite alternate;
        }
        
        .boom-gif {
            max-width: 400px;
            max-height: 400px;
            animation: shake 0.5s infinite;
        }
        
        @keyframes float {
            from { transform: translateY(0); }
            to { transform: translateY(-20px); }
        }
        
        @keyframes shake {
            0%, 100% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(5deg) scale(1.1); }
            75% { transform: rotate(-5deg) scale(1.1); }
        }
        
        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }
        
        @keyframes hologram {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        
        @keyframes victoryPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-5px); }
        }
        
        .bounce {
            animation: bounce 0.5s ease-in-out;
        }
        
        /* RESPONSIVE */
        @media (max-width: 500px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .buttons-row {
                flex-direction: column;
                align-items: center;
            }
            .action-btn, .game-btn {
                width: 100%;
                max-width: 250px;
            }
        }
    </style>
</head>
<body>
    <!-- VICTORY OVERLAY -->
    <div class="victory-overlay" id="victoryOverlay">
        <div class="victory-title">🎉 VICTORY! 🎉</div>
        <div class="victory-message" id="victoryMessage"></div>
        <img src="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/boom.gif" class="event-gif" style="max-width: 200px;">
        <button class="victory-restart" id="victoryRestart">PLAY AGAIN</button>
    </div>
    
    <!-- EVENT OVERLAYS -->
    <div id="eventOverlay" class="event-overlay" style="display: none;"></div>
    <div id="boomOverlay" class="boom-overlay" style="display: none;"></div>
    
    <!-- AUDIO PLAYERS -->
    <audio id="jumpSound" preload="auto">
        <source src="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/jump.mp3" type="audio/mpeg">
    </audio>
    
    <audio id="deathSound" preload="auto">
        <source src="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/death.mp3" type="audio/mpeg">
    </audio>
    
    <audio id="coinSound" preload="auto">
        <source src="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/coin.mp3" type="audio/mpeg">
    </audio>
    
    <audio id="purchaseSound" preload="auto">
        <source src="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/select.mp3" type="audio/mpeg">
    </audio>
    
    <audio id="powerupSound" preload="auto">
        <source src="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/powerup.mp3" type="audio/mpeg">
    </audio>
    
    <audio id="victorySound" preload="auto">
        <source src="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/victory.mp3" type="audio/mpeg">
    </audio>
    
    <audio id="sixtySevenSound" preload="auto">
        <source src="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/67.mp3" type="audio/mpeg">
    </audio>
    
    <audio id="boomSound" preload="auto">
        <source src="https://raw.githubusercontent.com/CRIX447/crix-website/main/img/boom.mp3" type="audio/mpeg">

                cosmetics.forEach(item => {
                    item.owned = ownedIds.includes(item.id);

            const savedEquipped = localStorage.getItem('flappyCrixEquipped');
            if (savedEquipped) {
                const equipped = JSON.parse(savedEquipped);
                cosmetics.forEach(item => {
                    if (equipped[item.type] === item.id) {
                        item.equipped = true;
                    }
                });
            }
            
            const savedPowerups = localStorage.getItem('flappyCrixPowerups');
            if (savedPowerups) {
                const active = JSON.parse(savedPowerups);
                powerups.forEach(p => {
                    if (active[p.id]) {
                        p.active = true;
                        p.timeLeft = active[p.id].timeLeft || p.duration;
                        startPowerupTimer(p);
                    }
                });
            }
            
            updateMultiplier();
        }
        
        // ========== POWER-UP TIMERS ==========
        function startPowerupTimer(powerup) {
            if (powerup.timerInterval) clearInterval(powerup.timerInterval);
            
            powerup.timerInterval = setInterval(() => {
                powerup.timeLeft--;
                
                if (powerup.timeLeft <= 0) {
                    powerup.active = false;
                    powerup.timeLeft = 0;
                    clearInterval(powerup.timerInterval);
                    
                    savePowerups();
                    
                    if (powerup.id === 'x2coins') {
                        updateMultiplier();
                    }
                }
                
                updateActivePowerupsDisplay();
            }, 1000);
        }
        
        function activatePowerup(powerupId) {
            const powerup = powerups.find(p => p.id === powerupId);
            if (!powerup) return;
            
            powerup.active = true;
            powerup.timeLeft = powerup.duration;
            playPowerupSound();
            startPowerupTimer(powerup);
            
            if (powerupId === 'x2coins') {
                updateMultiplier();
            }
            
            savePowerups();
            updateActivePowerupsDisplay();
        }

        function updatePreview() {
            previewCtx.clearRect(0, 0, 120, 120);
            
            // Background
            previewCtx.fillStyle = '#0A0A0F';
            previewCtx.fillRect(0, 0, 120, 120);
            
            // Grid
            previewCtx.strokeStyle = 'rgba(255, 70, 85, 0.1)';
            previewCtx.lineWidth = 1;
            for (let i = 0; i < 120; i += 20) {
                previewCtx.beginPath();
                previewCtx.moveTo(i, 0);
                previewCtx.lineTo(i, 120);
                previewCtx.stroke();
                previewCtx.beginPath();
                previewCtx.moveTo(0, i);
                previewCtx.lineTo(120, i);
                previewCtx.stroke();
            }
            
            // Bird
            previewCtx.save();
            previewCtx.translate(60, 60);
            
            let size = cheats.bigbird ? 45 : 35;
            
            if (birdImage.complete) {
                previewCtx.drawImage(birdImage, -size/2, -size/2, size, size);
                
                const shirt = cosmetics.find(c => c.type === 'shirt' && c.equipped);
                if (shirt) {
                    const shirtImg = new Image();
                    shirtImg.src = shirt.image;
                    previewCtx.drawImage(shirtImg, -size/2, -size/2, size, size);
                }
                
                const hat = cosmetics.find(c => c.type === 'hat' && c.equipped);
                if (hat) {
                    const hatImg = new Image();
                    hatImg.src = hat.image;
                    previewCtx.drawImage(hatImg, -size/2, -size/2 - 5, size, size);
                }
            }
            
            previewCtx.restore();
            
            const hat = cosmetics.find(c => c.type === 'hat' && c.equipped);
            const shirt = cosmetics.find(c => c.type === 'shirt' && c.equipped);
            previewTitle.textContent = hat || shirt ? 'CURRENT DRIP' : 'NO DRIP EQUIPPED';
        }
        
        // ========== GAME CLASS ==========
        class FlappyBird {
            constructor() {
                this.reset();
            }
            
            reset() {
                let size = cheats.bigbird ? 45 : 30;
                
                this.bird = {
                    x: 100,
                    y: 300,
                    width: size,
                    height: size,
                    velocity: 0,
                    gravity: cheats.slowmo ? 0.15 : 0.25,
                    jump: cheats.slowmo ? -5 : -6.5
                };
                
                this.pipes = [];
                this.pipeWidth = 50;
                this.pipeGap = 170;
                this.frameCount = 0;
                this.score = 0;
                this.gameOver = false;
                
                coins = [];
                hasTriggered67 = false;
                hasTriggered1000 = false;
            }
            
            isCoinPositionSafe(x, y) {
                if (y < 40 || y > canvas.height - 40) return false;
                
                for (let pipe of this.pipes) {
                    if (Math.abs(x - pipe.x) < 60) {
                        if (y < pipe.top - 30 || y > pipe.bottom + 30) {
                            return false;
                        }
                    }
                }
                
                return true;
            }
            
            getSafeCoinY(x) {
                for (let attempt = 0; attempt < 50; attempt++) {
                    const y = Math.random() * (canvas.height - 80) + 40;
                    if (this.isCoinPositionSafe(x, y)) {
                        return y;
                    }
                }
                return canvas.height / 2;
            }
            
            draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Grid
                ctx.strokeStyle = 'rgba(255, 70, 85, 0.1)';
                ctx.lineWidth = 1;
                for (let i = 0; i < canvas.width; i += 50) {
                    ctx.beginPath();
                    ctx.moveTo(i, 0);
                    ctx.lineTo(i, canvas.height);
                    ctx.stroke();
                }
                for (let i = 0; i < canvas.height; i += 50) {
                    ctx.beginPath();
                    ctx.moveTo(0, i);
                    ctx.lineTo(canvas.width, i);
                    ctx.stroke();
                }
                
                // Pipes
                ctx.fillStyle = '#00FF9D';
                ctx.shadowColor = '#00FF9D';
                ctx.shadowBlur = 10;
                this.pipes.forEach(pipe => {
                    ctx.fillRect(pipe.x, 0, this.pipeWidth, pipe.top);
                    ctx.fillRect(pipe.x, pipe.bottom, this.pipeWidth, canvas.height - pipe.bottom);
                });
                ctx.shadowBlur = 0;
                
                // Coins
                coins.forEach(coin => {
                    if (!coin.collected && coinImage.complete) {
                        ctx.drawImage(coinImage, coin.x - 15, coin.y - 15, 30, 30);
                    }
                });
                
                // Bird
                ctx.save();
                ctx.translate(this.bird.x, this.bird.y);
                
                let rotation = Math.min(Math.max(this.bird.velocity * 0.1, -0.5), 0.5);
                ctx.rotate(rotation);
                
                if (birdImage.complete) {
                    let size = cheats.bigbird ? 45 : 30;
                    ctx.drawImage(birdImage, -size/2, -size/2, size, size);
                    
                    const shirt = cosmetics.find(c => c.type === 'shirt' && c.equipped);
                    if (shirt) {
                        const shirtImg = new Image();
                        shirtImg.src = shirt.image;
                        ctx.drawImage(shirtImg, -size/2, -size/2, size, size);
                    }
                    
                    const hat = cosmetics.find(c => c.type === 'hat' && c.equipped);
                    if (hat) {
                        const hatImg = new Image();
                        hatImg.src = hat.image;
                        ctx.drawImage(hatImg, -size/2, -size/2 - 5, size, size);
                    }
                }
                
                ctx.restore();
                
                // Score
                if (!this.gameOver && gameRunning) {
                    ctx.fillStyle = '#FF6B35';
                    ctx.font = '20px "CRIX Pixel", monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText(`SCORE: ${this.score}`, canvas.width / 2, 50);
                }
                
                if (this.gameOver) {
                    ctx.fillStyle = '#FF4655';
                    ctx.font = '28px "CRIX Pixel", monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2);
                    ctx.font = '16px "CRIX Pixel", monospace';
                    ctx.fillText('Press START', canvas.width / 2, canvas.height / 2 + 40);
                }
            }
            
            update() {
                if (this.gameOver) return;
                
                const shieldActive = powerups.find(p => p.id === 'shield')?.active || cheats.godmode;
                const magnetActive = powerups.find(p => p.id === 'magnet')?.active || false;
                
                this.bird.velocity += this.bird.gravity;
                this.bird.y += this.bird.velocity;
                
                if (!shieldActive) {
                    if (this.bird.y < 10 || this.bird.y > canvas.height - 10) {
                        this.gameOver = true;
                        playDeathSound();
                        this.updateHighScore();
                    }
                } else {
                    if (this.bird.y < 10) {
                        this.bird.y = 10;
                        this.bird.velocity = Math.abs(this.bird.velocity) * 0.5;
                    }
                    if (this.bird.y > canvas.height - 10) {
                        this.bird.y = canvas.height - 10;
                        this.bird.velocity = -Math.abs(this.bird.velocity) * 0.5;
                    }
                }
                
                let pipeRate = cheats.slowmo ? 180 : 120;
                if (this.frameCount % pipeRate === 0) {
                    const topHeight = Math.random() * (canvas.height - this.pipeGap - 150) + 70;
                    this.pipes.push({
                        x: canvas.width,
                        top: topHeight,
                        bottom: topHeight + this.pipeGap,
                        scored: false
                    });
                }
                
                let coinRate = cheats.coinlord ? 20 : 40;
                let coinChance = cheats.coinlord ? 0.8 : 0.4;
                
                if (this.frameCount % coinRate === 0 && gameRunning) {
                    if (Math.random() < coinChance) {
                        const coinX = canvas.width + 40;
                        const coinY = this.getSafeCoinY(coinX);
                        coins.push({
                            x: coinX,
                            y: coinY,
                            collected: false
                        });
                    }
                }
                
                let speed = cheats.slowmo ? 1.5 : 2.5;
                for (let i = this.pipes.length - 1; i >= 0; i--) {
                    this.pipes[i].x -= speed;
                    
                    if (!shieldActive) {
                        if (this.bird.x + 15 > this.pipes[i].x && 
                            this.bird.x - 15 < this.pipes[i].x + this.pipeWidth) {
                            if (this.bird.y - 15 < this.pipes[i].top || 
                                this.bird.y + 15 > this.pipes[i].bottom) {
                                this.gameOver = true;
                                playDeathSound();
                                this.updateHighScore();
                            }
                        }
                    }
                    
                    if (this.pipes[i].x + this.pipeWidth < this.bird.x && !this.pipes[i].scored) {
                        this.score++;
                        this.pipes[i].scored = true;
                        gameScore.textContent = this.score;
                        
                        if (this.score === 67 && !hasTriggered67) {
                            trigger67();
                        }
                        
                        if (this.score === 1000 && !hasTriggered1000) {
                            trigger1000();
                        }
                    }
                    
                    if (this.pipes[i].x + this.pipeWidth < 0) {
                        this.pipes.splice(i, 1);
                    }
                }
                
                for (let i = coins.length - 1; i >= 0; i--) {
                    if (!coins[i].collected) {
                        coins[i].x -= speed;
                        
                        let dist;
                        if (magnetActive) {
                            const dx = this.bird.x - coins[i].x;
                            const dy = this.bird.y - coins[i].y;
                            dist = Math.hypot(dx, dy);
                            if (dist < 80) {
                                coins[i].x += dx * 0.05;
                                coins[i].y += dy * 0.05;
                            }
                        }
                        
                        dist = Math.hypot(this.bird.x - coins[i].x, this.bird.y - coins[i].y);
                        if (dist < 30) {
                            coins[i].collected = true;
                            coinCount += coinMultiplier;
                            playCoinSound();
                            updateCoinDisplay();
                            localStorage.setItem('flappyCrixCoins', coinCount);
                        }
                        
                        if (coins[i].x + 30 < 0) {
                            coins.splice(i, 1);
                        }
                    } else {
                        coins.splice(i, 1);
                    }
                }
                
                this.frameCount++;
            }
            
            updateHighScore() {
                if (this.score > highScore) {
                    highScore = this.score;
                    localStorage.setItem('flappyCrixHighScore', highScore);
                    highScoreEl.textContent = highScore;
                }
            }
            
            jump() {
                if (this.gameOver || !gameRunning) return;
                this.bird.velocity = this.bird.jump;
                playJumpSound();
            }
        }
        
        let game = new FlappyBird();
        
        // ========== SOUND FUNCTIONS ==========
        function playJumpSound() {
            jumpSound.currentTime = 0;
            jumpSound.volume = 0.3;
            jumpSound.play().catch(e => console.log('Jump sound blocked'));
        }
        
        function playDeathSound() {
            deathSound.currentTime = 0;
            deathSound.volume = 0.4;
            deathSound.play().catch(e => console.log('Death sound blocked'));
            
            if (!musicMuted) {
                bgMusic.pause();
                musicWasPlaying = true;
                musicToggle.innerHTML = '🔇 MUSIC';
                musicMuted = true;
            }
        }
        
        function playSelectSound() {
            purchaseSound.currentTime = 0;
            purchaseSound.volume = 0.3;
            purchaseSound.play().catch(e => console.log('Select sound blocked'));
        }
        
        function playCoinSound() {
            coinSound.currentTime = 0;
            coinSound.volume = 0.3;
            coinSound.play().catch(e => console.log('Coin sound blocked'));
        }
        
        function playPurchaseSound() {
            purchaseSound.currentTime = 0;
            purchaseSound.volume = 0.3;
            purchaseSound.play().catch(e => console.log('Purchase sound blocked'));
        }
        
        function playPowerupSound() {
            powerupSound.currentTime = 0;
            powerupSound.volume = 0.3;
            powerupSound.play().catch(e => console.log('Powerup sound blocked'));
        }
        
        function updateCoinDisplay() {
            coinCountEl.innerHTML = `🪙 ${coinCount}`;
            if (lockerBalance) lockerBalance.innerHTML = `🪙 ${coinCount}`;
        }
        
        // ========== MUSIC CONTROL ==========
        bgMusic.volume = 0.3;
        musicMuted = true;
        musicToggle.innerHTML = '🔇 MUSIC';
        
        musicToggle.addEventListener('click', () => {
            if (musicMuted) {
                bgMusic.play();
                musicToggle.innerHTML = '🔊 MUSIC';
            } else {
                bgMusic.pause();
                musicToggle.innerHTML = '🔇 MUSIC';
            }
            musicMuted = !musicMuted;
            playSelectSound();
        });
        
        // ========== CHEAT CODES ==========
        const CHEATS = {
            '6969': () => {
                cheats.godmode = !cheats.godmode;
                updateCheatIndicators();
                alert(cheats.godmode ? '👼 Godmode activated!' : '👼 Godmode deactivated');
            },
            '1337': () => {
                cheats.coinlord = !cheats.coinlord;
                updateCheatIndicators();
                alert(cheats.coinlord ? '💰 Coin Lord activated!' : '💰 Coin Lord deactivated');
                if (gameRunning) game.reset();
            },
            '0420': () => {
                cheats.slowmo = !cheats.slowmo;
                updateCheatIndicators();
                alert(cheats.slowmo ? '⏱️ Slow motion activated!' : '⏱️ Slow motion deactivated');
                if (gameRunning) game.reset();
            },
            '8008': () => {
                cheats.bigbird = !cheats.bigbird;
                updateCheatIndicators();
                alert(cheats.bigbird ? '🦅 Big bird activated!' : '🦅 Big bird deactivated');
                if (gameRunning) game.reset();
                updatePreview();
            },
            '2468': () => {
                const x2 = powerups.find(p => p.id === 'x2coins');
                if (!x2.active) {
                    activatePowerup('x2coins');
                }
            },
            '9999': () => {
                coinCount += 50;
                updateCoinDisplay();
                localStorage.setItem('flappyCrixCoins', coinCount);
                alert('💰 +50 coins!');
            }
        };
        
        cheatInput.addEventListener('input', (e) => {
            const code = e.target.value;
            if (code.length === 4 && CHEATS[code]) {
                CHEATS[code]();
                cheatInput.value = '';
            }
        });
        
        // ========== VICTORY RESTART ==========
        victoryRestart.addEventListener('click', () => {
            victoryOverlay.classList.remove('active');
            game.reset();
            startGame();
        });
        
        // ========== EXIT WITH BOUNCE ==========
        backLink.addEventListener('click', (e) => {
            if (cheats.godmode) {
                e.preventDefault();
                document.querySelector('.game-container').classList.add('bounce');
                alert('HEY! I KNOW YOU GOT GODMODE BUT IT DOESNT MEAN YOU GOTTA BREAK THE FORTH WALL MAN!');
                setTimeout(() => {
                    document.querySelector('.game-container').classList.remove('bounce');
                }, 500);
                setTimeout(() => {
                    window.open('https://crixgamingvr.vercel.app', '_blank');
                }, 600);
            }
        });
        
        // ========== GAME LOOP ==========
        function gameLoop() {
            if (gameRunning) {
                game.update();
                game.draw();
                gameAnimationFrame = requestAnimationFrame(gameLoop);
            }
        }
        
        function startGame() {
            playSelectSound();
            game.reset();
            gameRunning = true;
            gameScore.textContent = '0';
            
            if (musicWasPlaying && musicMuted) {
                bgMusic.play();
                musicToggle.innerHTML = '🔊 MUSIC';
                musicMuted = false;
                musicWasPlaying = false;
            }
            
            if (gameAnimationFrame) cancelAnimationFrame(gameAnimationFrame);
            gameLoop();
        }
        
        // ========== INPUT HANDLERS ==========
        canvasWrapper.addEventListener('click', () => game.jump());
        canvasWrapper.addEventListener('touchstart', (e) => {
            e.preventDefault();
            game.jump();
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                game.jump();
            }
        });
        
        // ========== EVENT LISTENERS ==========
        startGameBtn.addEventListener('click', startGame);
        
        storeBtn.addEventListener('click', openStore);
        closeStoreBtn.addEventListener('click', closeStore);
        
        lockerBtn.addEventListener('click', openLocker);
        closeLockerBtn.addEventListener('click', closeLocker);
        
        tabPowerupsStore.addEventListener('click', () => {
            tabPowerupsStore.classList.add('active');
            tabCosmeticsStore.classList.remove('active');
            storePowerups.style.display = 'block';
            storeCosmetics.style.display = 'none';
        });
        
        tabCosmeticsStore.addEventListener('click', () => {
            tabCosmeticsStore.classList.add('active');
            tabPowerupsStore.classList.remove('active');
            storePowerups.style.display = 'none';
            storeCosmetics.style.display = 'block';
        });
        
        window.addEventListener('click', (e) => {
            if (e.target === storeModal) closeStore();
            if (e.target === lockerModal) closeLocker();
        });
        
        // ========== INITIALIZE ==========
        highScoreEl.textContent = highScore;
        loadSavedData();
        updateCoinDisplay();
        updateActivePowerupsDisplay();
        updateCheatIndicators();
        game.draw();
        
        birdImage.onload = () => {
            updatePreview();
            game.draw();
        };
    </script>
</body>
</html>
